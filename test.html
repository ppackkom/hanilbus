<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한일운수 실시간 정체 수집기 (v0.3)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .header { border-bottom: 2px solid #ff7f50; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 노선 선택기 디자인 추가 */
        .route-selector { background-color: #2c2c2e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ff7f50; }
        .route-selector select { width: 100%; padding: 10px; font-size: 18px; border-radius: 5px; background-color: #333; color: white; border: none; outline: none; text-align: center; font-weight: bold; }
        
        #statusBoard { background-color: #333; color: white; font-size: 24px; font-weight: bold; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #555; transition: 0.5s; }
        .status-box { background-color: #2c2c2e; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .speed-text { font-size: 60px; font-weight: bold; color: #ccc; margin: 10px 0; }
        #jamInfoBox { background-color: #4a2323; border: 2px dashed #ff4d4d; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; text-align: left; }
        #jamInfoBox h3 { margin: 0 0 10px 0; color: #ff4d4d; font-size: 18px; text-align: center; }
        #jamInfoBox p { margin: 5px 0; font-size: 15px; color: #fcc; }
        .highlight { font-size: 20px; font-weight: bold; color: white; }
        .btn { background-color: #ff7f50; color: white; border: none; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px;}
        .btn-stop { background-color: #ff4d4d; display: none; }
        #serverLog { margin-top: 20px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📡 한일운수 정체상황 수집기</h2>
        <p style="font-size: 13px; color: #ff7f50;">(이 폰은 거치대에 계속 켜두시면 됩니다)</p>
    </div>

    <div class="route-selector">
        <div style="font-size: 16px; margin-bottom: 8px; color: #ccc;">현재 운행 중인 노선을 선택하세요</div>
        <select id="routeSelect">
            <option value="609" selected>🚌 609번</option>
            <option value="204">🚌 204번</option>
            <option value="894">🚌 894번</option>
            <option value="937">🚌 937번</option>
            <option value="dalseo6">🚌 달서6번</option>
        </select>
    </div>

    <div id="statusBoard">상태 분석 대기 중...</div>

    <div id="jamInfoBox">
        <h3>🚨 현재 정체 구간 기록 중</h3>
        <p>⏱️ 갇혀있는 시간: <span class="highlight" id="jamTime">0</span> 초</p>
        <p>📏 엉금엉금 이동거리: <span class="highlight" id="jamDist">0</span> m</p>
    </div>

    <div class="status-box">
        <div style="font-size: 18px;">현재 주행 속도</div>
        <div class="speed-text" id="speedDisplay">0 <span style="font-size: 24px;">km/h</span></div>
    </div>

    <button class="btn" id="startBtn" onclick="startTracking()">🚀 수집 시작 (서버 연결)</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopTracking()">🛑 수집 중지</button>

    <div id="serverLog" style="color: #888;">대기 중...</div>

    <script>
        // 파이어베이스 설정 (기존과 동일)
        const firebaseConfig = {
            apiKey: "AIzaSyCKXl4AYBlrotyF3VHv6Gr0GP-p1ii4Bww",
            authDomain: "hanilbus-760ae.firebaseapp.com",
            databaseURL: "https://hanilbus-760ae-default-rtdb.firebaseio.com/",
            projectId: "hanilbus-760ae",
            storageBucket: "hanilbus-760ae.firebasestorage.app",
            messagingSenderId: "454505545954",
            appId: "1:454505545954:web:a1951147f2b4b34d019ebb",
            measurementId: "G-160EWPVGM5"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let watchId = null, wakeLock = null, logicTimer = null, serverTimer = null;
        let currentLat = 0, currentLon = 0, currentSpeed = 0;
        let crawlSeconds = 0, isJam = false, startJamLat = 0, startJamLon = 0;
        let currentStatusText = "대기중";

        function sendDataToServer() {
            if (currentLat !== 0) {
                // 핵심 변경점: 선택한 노선 번호를 가져와서 서버 경로를 동적으로 만듭니다!
                const selectedRoute = document.getElementById('routeSelect').value;
                
                database.ref('test_busStatus/' + selectedRoute).set({
                    status: currentStatusText,
                    speed: currentSpeed,
                    lat: currentLat,
                    lon: currentLon,
                    jamTime: crawlSeconds,
                    timestamp: new Date().toLocaleTimeString()
                }).then(() => {
                    document.getElementById('serverLog').innerText = `✅ [${selectedRoute}번] 서버 전송 완료: ${new Date().toLocaleTimeString()}`;
                    document.getElementById('serverLog').style.color = "#00cc44";
                }).catch((error) => {
                    document.getElementById('serverLog').innerText = "❌ 전송 실패: " + error.message;
                    document.getElementById('serverLog').style.color = "#ff4d4d";
                });
            }
        }

        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function requestWakeLock() { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }

        function startTracking() {
            if (!("geolocation" in navigator)) return;
            
            // 수집 중에는 노선을 바꿀 수 없도록 선택 창을 비활성화합니다.
            document.getElementById('routeSelect').disabled = true;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            requestWakeLock();
            document.getElementById('serverLog').innerText = "GPS 위치 확인 중...";

            logicTimer = setInterval(function() {
                const statusBoard = document.getElementById('statusBoard');
                const jamInfoBox = document.getElementById('jamInfoBox');

                if (currentSpeed === 0) {
                    currentStatusText = "신호 대기 / 승하차 중";
                    statusBoard.innerHTML = "🛑 " + currentStatusText;
                    statusBoard.style.backgroundColor = "#e67e22";
                    statusBoard.style.borderColor = "#ff9f43";
                } 
                else if (currentSpeed >= 1 && currentSpeed <= 20) {
                    crawlSeconds++;
                    currentStatusText = "저속 주행 감지 중";
                    statusBoard.innerHTML = `🐢 ${currentStatusText} (${crawlSeconds}초)`;
                    statusBoard.style.backgroundColor = "#333";
                    
                    if (crawlSeconds >= 30) {
                        if (!isJam) { isJam = true; startJamLat = currentLat; startJamLon = currentLon; jamInfoBox.style.display = "block"; }
                        currentStatusText = "차량 정체 감지";
                        statusBoard.innerHTML = "🚨 " + currentStatusText;
                        statusBoard.style.backgroundColor = "#4a2323";
                        statusBoard.style.borderColor = "#ff4d4d";
                        document.getElementById('jamTime').innerText = crawlSeconds;
                        document.getElementById('jamDist').innerText = getDistanceInMeters(startJamLat, startJamLon, currentLat, currentLon);
                    }
                } 
                else if (currentSpeed > 20) {
                    crawlSeconds = 0; isJam = false; jamInfoBox.style.display = "none";
                    currentStatusText = "정상 속도 주행 중";
                    statusBoard.innerHTML = "🚌 " + currentStatusText;
                    statusBoard.style.backgroundColor = "#234a23";
                    statusBoard.style.borderColor = "#00cc44";
                }
            }, 1000);

            serverTimer = setInterval(sendDataToServer, 5000);

            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;
                    currentSpeed = Math.round((position.coords.speed || 0) * 3.6);
                    document.getElementById('speedDisplay').innerHTML = `${currentSpeed} <span style="font-size: 24px;">km/h</span>`;
                }, 
                function(error) {
                    document.getElementById('statusBoard').innerHTML = "⚠️ GPS 신호 오류";
                }, 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function stopTracking() {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (wakeLock !== null) wakeLock.release();
            if (logicTimer !== null) clearInterval(logicTimer);
            if (serverTimer !== null) clearInterval(serverTimer);
            
            // 수집을 멈추면 다시 노선을 선택할 수 있게 풀어줍니다.
            document.getElementById('routeSelect').disabled = false;
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('jamInfoBox').style.display = "none";
            document.getElementById('statusBoard').innerHTML = "수집 중지됨";
            document.getElementById('statusBoard').style.backgroundColor = "#333";
            document.getElementById('speedDisplay').innerHTML = '0 <span style="font-size: 24px;">km/h</span>';
            document.getElementById('serverLog').innerText = "대기 중...";
            document.getElementById('serverLog').style.color = "#888";
        }
    </script>
</body>
</html>
