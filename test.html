<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>버스 정체 분석 진단용 v5.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .header { border-bottom: 2px solid #ff7f50; padding-bottom: 10px; margin-bottom: 15px; }
        #statusBoard { background-color: #333; color: white; font-size: 24px; font-weight: bold; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .status-box { background-color: #2c2c2e; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .speed-text { font-size: 60px; font-weight: bold; color: #ccc; margin: 10px 0; }
        .btn { background-color: #ff7f50; color: white; border: none; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px;}
        .btn-stop { background-color: #ff4d4d; display: none; }
        /* 에러 메시지가 잘 보이도록 디자인 수정 */
        #serverLog { margin-top: 20px; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 5px; background-color: #333; word-break: break-all; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🩺 파이어베이스 연결 진단 (v5.1)</h2>
        <p style="font-size: 13px; color: #ff7f50;">(왜 연결이 안 되는지 화면에 띄워줍니다)</p>
    </div>

    <div id="statusBoard">상태 분석 대기 중...</div>

    <div class="status-box">
        <div style="font-size: 18px;">현재 주행 속도</div>
        <div class="speed-text" id="speedDisplay">0 <span style="font-size: 24px;">km/h</span></div>
    </div>

    <button class="btn" id="startBtn" onclick="startTracking()">🚀 연결 진단 시작</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopTracking()">🛑 중지</button>

    <div id="serverLog" style="color: #ccc;">대기 중... 버튼을 눌러주세요.</div>

    <script>
        // ========================================================
        // ★★★ 파이어베이스 설정 복사해 넣는 곳 ★★★
        const firebaseConfig = {// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCKXI4AYBIrotyF3VHv6Gr0GP-p1ii4Bww",
  authDomain: "hanilbus-760ae.firebaseapp.com",
  projectId: "hanilbus-760ae",
  storageBucket: "hanilbus-760ae.firebasestorage.app",
  messagingSenderId: "454505545954",
  appId: "1:454505545954:web:a1951147f2b4b34d019ebb",
  measurementId: "G-160EWPVGM5"
};
            apiKey: "여기에_재민님의_apiKey를_넣으세요",
            authDomain: "여기에_넣으세요.firebaseapp.com",
            databaseURL: "https://여기에_넣으세요.firebaseio.com", 
            projectId: "여기에_넣으세요",
            storageBucket: "여기에_넣으세요.appspot.com",
            messagingSenderId: "여기에_넣으세요",
            appId: "여기에_넣으세요"
        };
        // ========================================================

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        } catch (err) {
            document.getElementById('serverLog').innerText = "❌ 파이어베이스 초기화 실패! (Config 코드를 확인하세요)";
            document.getElementById('serverLog').style.color = "#ff4d4d";
        }

        const database = firebase.database();
        let watchId = null;

        function startTracking() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            
            const logArea = document.getElementById('serverLog');
            logArea.innerText = "서버 똑똑.. 문 두드리는 중! ⏳";
            logArea.style.color = "#ffcc00";

            // [핵심 진단] GPS 잡기 전에 무조건 서버부터 한번 찔러봅니다!
            database.ref('test_busStatus/test').set({
                message: "연결 테스트",
                time: new Date().toLocaleTimeString()
            }).then(() => {
                // 성공하면 서버 문제는 없음! (GPS만 잡히면 됨)
                logArea.innerText = "✅ 파이어베이스 연결 완벽 성공! \n(이제 밖에서 GPS 신호만 잡히면 정상 작동합니다)";
                logArea.style.color = "#00cc44";
            }).catch((error) => {
                // 실패하면 왜 실패했는지 에러 메시지를 화면에 그대로 출력!
                logArea.innerText = "❌ 서버 에러 발생!\n" + error.message;
                logArea.style.color = "#ff4d4d";
            });

            // GPS 수신
            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition(
                    function(position) {
                        const speed = Math.round((position.coords.speed || 0) * 3.6);
                        document.getElementById('speedDisplay').innerHTML = `${speed} <span style="font-size: 24px;">km/h</span>`;
                    }, 
                    function(error) {
                        document.getElementById('statusBoard').innerHTML = "⚠️ GPS 권한을 확인해주세요";
                    }, 
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            }
        }

        function stopTracking() {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('serverLog').innerText = "진단이 중지되었습니다.";
            document.getElementById('serverLog').style.color = "#ccc";
        }
    </script>
</body>
</html>
