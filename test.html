<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>버스 실시간 주행 테스트 v3</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1a1a1c;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            border-bottom: 2px solid #ff7f50;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        /* 현재 판별 상태를 보여주는 전광판 */
        #statusBoard {
            background-color: #333;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #555;
            transition: 0.5s; /* 색상이 부드럽게 변함 */
        }
        .status-box {
            background-color: #2c2c2e;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .speed-text {
            font-size: 60px;
            font-weight: bold;
            color: #ccc;
            margin: 10px 0;
        }
        .timer-text {
            font-size: 16px;
            color: #ffcc00;
            margin-bottom: 10px;
            height: 20px;
        }
        .btn {
            background-color: #ff7f50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-stop { background-color: #ff4d4d; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 자동 정체 판별 AI 테스트</h2>
        <p style="font-size: 13px; color: #ff7f50;">(30초 유지 시 자동 변경됩니다)</p>
    </div>

    <div id="statusBoard">상태 분석 대기 중...</div>

    <div class="status-box">
        <div style="font-size: 18px;">현재 주행 속도</div>
        <div class="speed-text" id="speedDisplay">0 <span style="font-size: 24px;">km/h</span></div>
        
        <div class="timer-text" id="timerDisplay"></div>
    </div>

    <button class="btn" id="startBtn" onclick="startTracking()">🚀 주행 기록 시작</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopTracking()">🛑 기록 중지</button>

    <div id="logArea" style="font-size: 12px; color: #888; margin-top: 20px;">
        데이터 수집 준비 완료
    </div>

    <script>
        let watchId = null;
        let wakeLock = null;
        let logicTimer = null;
        
        // AI 로직을 위한 변수들
        let lastSpeed = 0;
        let slowSeconds = 0;
        let fastSeconds = 0;
        let currentStatus = "대기중";

        async function requestWakeLock() {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function startTracking() {
            if (!("geolocation" in navigator)) return;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('statusBoard').innerHTML = "🔍 속도 분석 중...";
            
            requestWakeLock();

            // 1초마다 속도를 확인해서 조건을 따지는 '뇌' (AI 로직)
            logicTimer = setInterval(function() {
                const timerDisplay = document.getElementById('timerDisplay');
                const statusBoard = document.getElementById('statusBoard');
                const logArea = document.getElementById('logArea');

                if (lastSpeed <= 15) {
                    // 시속 15km 이하일 때
                    slowSeconds++;
                    fastSeconds = 0; // 빠른 카운트는 초기화
                    timerDisplay.innerHTML = `⚠️ 저속 주행 ${slowSeconds}초 유지 중...`;
                    
                    if (slowSeconds === 30 && currentStatus !== "정체") {
                        currentStatus = "정체";
                        statusBoard.innerHTML = "🐢 차량 정체 감지!";
                        statusBoard.style.backgroundColor = "#4a2323"; // 빨간 배경
                        statusBoard.style.borderColor = "#ff4d4d";
                        logArea.innerHTML = "📡 파이어베이스로 [정체] 데이터 전송 시뮬레이션 완료!";
                    }
                } else if (lastSpeed >= 30) {
                    // 시속 30km 이상일 때
                    fastSeconds++;
                    slowSeconds = 0; // 느린 카운트는 초기화
                    timerDisplay.innerHTML = `💨 원활 주행 ${fastSeconds}초 유지 중...`;

                    if (fastSeconds === 30 && currentStatus !== "원활") {
                        currentStatus = "원활";
                        statusBoard.innerHTML = "✅ 소통 원활 감지!";
                        statusBoard.style.backgroundColor = "#234a23"; // 초록 배경
                        statusBoard.style.borderColor = "#00cc44";
                        logArea.innerHTML = "📡 파이어베이스로 [원활] 데이터 전송 시뮬레이션 완료!";
                    }
                } else {
                    // 16~29km/h 사이의 애매한 속도일 때
                    slowSeconds = 0;
                    fastSeconds = 0;
                    timerDisplay.innerHTML = "안정적인 속도로 주행 중";
                }
            }, 1000); // 1초(1000ms)마다 실행

            // GPS 위성에서 속도 받아오기 (기존과 동일)
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    let speedMps = position.coords.speed;
                    if (speedMps === null) speedMps = 0;
                    
                    lastSpeed = Math.round(speedMps * 3.6); // 로직을 위해 현재 속도 저장
                    
                    // 화면에 속도 표시
                    document.getElementById('speedDisplay').innerHTML = `${lastSpeed} <span style="font-size: 24px;">km/h</span>`;
                    
                    // 속도에 따라 글자 색상 변경
                    if(lastSpeed <= 15) document.getElementById('speedDisplay').style.color = "#ff4d4d"; // 빨강
                    else if(lastSpeed >= 30) document.getElementById('speedDisplay').style.color = "#00cc44"; // 초록
                    else document.getElementById('speedDisplay').style.color = "#ccc"; // 회색
                }, 
                function(error) { /* 에러 처리 생략 */ }, 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function stopTracking() {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
            if (logicTimer !== null) { clearInterval(logicTimer); logicTimer = null; }
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('statusBoard').innerHTML = "상태 분석 대기 중...";
            document.getElementById('statusBoard').style.backgroundColor = "#333";
            document.getElementById('statusBoard').style.borderColor = "#555";
            document.getElementById('timerDisplay').innerHTML = "";
            document.getElementById('speedDisplay').innerHTML = '0 <span style="font-size: 24px;">km/h</span>';
        }
    </script>
</body>
</html>
