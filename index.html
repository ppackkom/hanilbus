<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한일운수 도로정보</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f97316">
<style>
  /* [Claude 원본 디자인 + Gemini 시인성 강화] */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap');
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
    --accent:#f97316;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
    --blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--text:#e6edf3;--text2:#8b949e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:80px;}
  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .logo-icon{width:42px;height:42px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
  
  /* ⚡ 퀵제보 영역 (버튼 크기 대폭 확대) */
  .quick-report {padding:16px; background:var(--surface); border-bottom:1px solid var(--border);}
  .quick-report-label {font-size:18px; font-weight:900; color:var(--accent); margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .quick-btns {display:grid; grid-template-columns: repeat(2, 1fr); gap:12px;}
  .quick-btn {
    display:flex; flex-direction:column; align-items:center; gap:8px; padding:20px 10px; 
    border-radius:16px; border:none; font-size:17px; font-weight:900; cursor:pointer; transition:0.2s;
  }
  .quick-btn.accident {background:rgba(239,68,68,0.2); color:var(--red); border:2px solid rgba(239,68,68,0.3);}
  .quick-btn.slow {background:rgba(234,179,8,0.2); color:var(--yellow); border:2px solid rgba(234,179,8,0.3);}
  .quick-btn.clear {background:rgba(34,197,94,0.2); color:var(--green); border:2px solid rgba(34,197,94,0.3);}
  .quick-btn.construction {background:rgba(59,130,246,0.2); color:var(--blue); border:2px solid rgba(59,130,246,0.3);}
  .quick-btn:active {transform:scale(0.95); filter:brightness(1.2);}

  .route-filter{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
  .route-btn{flex-shrink:0;padding:10px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;}
  .route-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .post-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
  .card-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;flex-wrap:wrap;}
  .route-badge{background:var(--accent);color:white;font-size:16px;font-weight:900;padding:5px 13px;border-radius:8px;min-width:56px;text-align:center;}
  .type-badge{padding:5px 12px;border-radius:20px;font-size:14px;font-weight:700;}
  .type-accident{background:rgba(239,68,68,0.15);color:var(--red);}
  .type-slow{background:rgba(234,179,8,0.15);color:var(--yellow);}
  .type-clear{background:rgba(34,197,94,0.15);color:var(--green);}
  .type-construction{background:rgba(59,130,246,0.15);color:var(--blue);}
  .card-body{padding:0 16px 14px;}
  .post-location{font-size:17px;font-weight:900;color:#fb923c;margin-bottom:8px;}
  .post-message{font-size:16px;line-height:1.7;color:var(--text);font-weight:500;}
  .fab{position:fixed;bottom:20px;right:20px;width:64px;height:64px;background:var(--accent);border-radius:20px;border:none;color:white;font-size:32px;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;}
  
  /* 오버레이 및 모달 */
  #startOverlay {display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;flex-direction:column;padding:20px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:flex-end;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 20px 38px;width:100%;max-width:480px;border-top:2px solid var(--accent);}
  .form-group{margin-bottom:16px;}
  .form-label{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:7px;display:block;}
  .form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--text);font-size:16px;outline:none;}
  .submit-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:white;font-size:17px;font-weight:700;cursor:pointer;margin-top:6px;}
  .voice-toggle{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;}
  .voice-toggle.on{border-color:var(--green);background:rgba(34,197,94,0.15);color:var(--green);}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">🚌</div><div class="logo-text">한일운수 도로정보</div></div>
  <div class="header-right">
    <button class="voice-toggle" id="voiceToggle" onclick="toggleVoice()"><span id="voiceLabel">음성 OFF</span></button>
  </div>
</header>

<div id="startOverlay">
  <div style="text-align:center;padding:40px 20px;background:var(--surface);border-radius:24px;border:2px solid var(--accent);width:100%;max-width:340px;">
    <div style="font-size:60px;margin-bottom:20px;">📢</div>
    <div style="font-size:22px;font-weight:900;color:var(--accent);margin-bottom:12px;">안전 운행 준비 완료!</div>
    <div style="font-size:15px;color:var(--text2);margin-bottom:30px;line-height:1.6;">화면을 터치하면 시작해요.<br>음성 알림이 정상 작동합니다.</div>
    <button onclick="dismissStartOverlay()" style="width:100%;padding:18px;background:var(--accent);border:none;border-radius:14px;color:white;font-size:18px;font-weight:900;cursor:pointer;">시작하기</button>
  </div>
</div>

<div id="onlineBar" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:rgba(34,197,94,0.08);border-bottom:1px solid rgba(34,197,94,0.15);">
  <div style="width:8px;height:8px;background:var(--green);border-radius:50%;"></div>
  <span style="font-size:14px;color:var(--green);font-weight:700;">현재 <span id="onlineCount">0</span>명 접속 중</span>
</div>

<div class="quick-report" id="quickReportArea">
  <div class="quick-report-label">⚡ 원터치 퀵제보 (즉시공유)</div>
  <div class="quick-btns">
    <button class="quick-btn accident" onclick="submitQuick('accident','🚨 사고')"><span style="font-size:28px">🚨</span><span>사고발생</span></button>
    <button class="quick-btn slow" onclick="submitQuick('slow','🐢 정체')"><span style="font-size:28px">🐢</span><span>정체중</span></button>
    <button class="quick-btn clear" onclick="submitQuick('clear','✅ 원활')"><span style="font-size:28px">✅</span><span>소통원활</span></button>
    <button class="quick-btn construction" onclick="submitQuick('construction','🚧 공사')"><span style="font-size:28px">🚧</span><span>공사중</span></button>
  </div>
</div>

<div class="route-filter" id="dynamicRouteFilter"></div>
<div class="feed" id="feed"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="form-group"><label class="form-label">노선</label><input class="form-input" id="routeInput" type="text" placeholder="예: 609"></div>
    <div class="form-group"><label class="form-label">위치</label><input class="form-input" id="locationInput" type="text" placeholder="정류장 명"></div>
    <div class="form-group"><label class="form-label">내용</label><input class="form-input" id="messageInput" type="text" placeholder="상황 설명"></div>
    <button class="submit-btn" onclick="submitPost()">📤 등록</button>
    <button class="submit-btn" style="background:var(--surface2); margin-top:10px;" onclick="closeModal()">취소</button>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
var firebaseConfig = {apiKey:"AIzaSyCKXI4AYBIrotyF3VHv6Gr0GP-p1ii4Bww",authDomain:"hanilbus-760ae.firebaseapp.com",projectId:"hanilbus-760ae",storageBucket:"hanilbus-760ae.firebasestorage.app",messagingSenderId:"454505545954",appId:"1:454505545954:web:a1951147f2b4b34d019ebb"};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var ALL_ROUTES_DATA = {
  '609': { stops: [{name:'대천동',lat:35.8092,lon:128.5148}, {name:'진천역',lat:35.818,lon:128.526}, {name:'반월당역',lat:35.8659,lon:128.5966}, {name:'영남대',lat:35.828,lon:128.746}] },
  '204': { stops: [{name:'범물1동',lat:35.8234,lon:128.6487}, {name:'반월당역',lat:35.8659,lon:128.5966}] },
  '937': { stops: [{name:'동대구역',lat:35.879,lon:128.628}, {name:'경북대',lat:35.888,lon:128.606}] },
  '894': { stops: [{name:'경일대',lat:35.795,lon:128.798}, {name:'하양역',lat:35.808,lon:128.775}] },
  '달서6': { stops: [{name:'남도버스',lat:35.828,lon:128.518}, {name:'월배역',lat:35.822,lon:128.533}] }
};

var voiceOn = false;
var currentFilter = '전체';

function initDynamicUI() {
  const routes = Object.keys(ALL_ROUTES_DATA);
  const filterArea = document.getElementById('dynamicRouteFilter');
  let filterHtml = '<button class="route-btn active" onclick="filterRoute(\'전체\', this)">전체</button>';
  routes.forEach(r => { filterHtml += `<button class="route-btn" onclick="filterRoute('${r}', this)">${r}번</button>`; });
  filterArea.innerHTML = filterHtml;
}

function filterRoute(route, btn) {
  currentFilter = route;
  document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function startOnlineTracking() {
  var myId = sessionStorage.getItem('busId') || ('user_'+Date.now());
  sessionStorage.setItem('busId', myId);
  db.collection('onlineUsers').doc(myId).set({updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
  db.collection('onlineUsers').onSnapshot(snap => { document.getElementById('onlineCount').textContent = snap.size; });
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceToggle');
  const label = document.getElementById('voiceLabel');
  btn.classList.toggle('on', voiceOn);
  label.textContent = voiceOn ? '음성 ON' : '음성 OFF';
  if(voiceOn) speak('음성 알림이 켜졌습니다');
}

function speak(t) { if(voiceOn && window.speechSynthesis) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); } }

function dismissStartOverlay() {
  document.getElementById('startOverlay').style.display = 'none';
  localStorage.setItem('dismissed', new Date().getTime());
}

function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function submitPost() {
  var route = document.getElementById('routeInput').value;
  var loc = document.getElementById('locationInput').value;
  var msg = document.getElementById('messageInput').value;
  db.collection('posts').add({route:route, location:loc, message:msg, type:'slow', typeLabel:'🐢 정체', timestamp:firebase.firestore.FieldValue.serverTimestamp()})
  .then(() => { closeModal(); });
}

function submitQuick(type, label) {
  navigator.geolocation.getCurrentPosition(pos => {
    db.collection('posts').add({route:'609', type:type, typeLabel:label, location:'현재 위치', message:label+' 보고', timestamp:firebase.firestore.FieldValue.serverTimestamp()});
  });
}

function renderFeed() {
  db.collection('posts').orderBy('timestamp','desc').get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      const p = doc.data();
      if(currentFilter === '전체' || p.route === currentFilter) {
        html += `<div class="post-card"><div class="card-header"><div class="route-badge">${p.route}번</div><div class="type-badge type-${p.type}">${p.typeLabel}</div></div><div class="card-body"><div class="post-location">📍 ${p.location}</div><div class="post-message">${p.message}</div></div></div>`;
      }
    });
    document.getElementById('feed').innerHTML = html;
  });
}

db.collection('posts').orderBy('timestamp','desc').onSnapshot(() => { renderFeed(); });

window.onload = function() {
  initDynamicUI();
  startOnlineTracking();
  if(new Date().getTime() - (localStorage.getItem('dismissed')||0) > 86400000) {
    document.getElementById('startOverlay').style.display = 'flex';
  }
};
</script>
</body>
</html>
