  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap');
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;

    --blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--text:#e6edf3;--text2:#8b949e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:80px;}
  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .logo-icon{width:42px;height:42px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .voice-toggle{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;}
  .voice-toggle.on{border-color:var(--green);background:rgba(34,197,94,0.15);color:var(--green);}
  .route-filter{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);}
  .route-btn{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;}
  .route-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  /* [중략된 CSS: 원본 index_1.html의 모든 스타일을 포함함] */

  <div class="header-right">
    <button class="voice-toggle" id="voiceToggle" onclick="toggleVoice()"><div class="voice-dot"></div><span id="voiceLabel">음성 OFF</span></button>
  </div>
</header>

<div id="startOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="text-align:center;padding:32px 24px;background:var(--surface);border-radius:20px;border:2px solid var(--accent);max-width:320px;width:90%;">
    <div style="font-size:52px;margin-bottom:12px;">🚌</div>
    <div style="font-size:20px;font-weight:900;color:var(--accent);margin-bottom:8px;">한일운수 도로정보</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6;">화면을 터치하면 시작해요.<br>음성 알림이 정상 작동합니다.</div>
    <button onclick="dismissStartOverlay()" style="width:100%;padding:16px;background:var(--accent);border:none;border-radius:12px;color:white;font-weight:700;cursor:pointer;">👆 터치해서 시작하기</button>
  </div>
</div>

<div id="onlineBar" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;background:rgba(34,197,94,0.08);border-bottom:1px solid rgba(34,197,94,0.15);">
  <div style="width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.2s infinite;"></div>

<div class="route-filter" id="dynamicRouteFilter"></div>
<div class="feed" id="feed"></div>

var firebaseConfig = {apiKey:"AIzaSyCKXI4AYBIrotyF3VHv6Gr0GP-p1ii4Bww",authDomain:"hanilbus-760ae.firebaseapp.com",projectId:"hanilbus-760ae",storageBucket:"hanilbus-760ae.firebasestorage.app",messagingSenderId:"454505545954",appId:"1:454505545954:web:a1951147f2b4b34d019ebb"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// [Gemini 수정: 접속자 수 새로고침 중복 방지]
function startOnlineTracking() {
  var storedId = sessionStorage.getItem('myBusOnlineId');
  if (!storedId) {
    storedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    sessionStorage.setItem('myBusOnlineId', storedId);
  }
  var onlineRef = db.collection('onlineUsers').doc(storedId);
  onlineRef.set({ updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  db.collection('onlineUsers').onSnapshot(snap => {
    document.getElementById('onlineCount').textContent = snap.size;
  });
}

// [음성 알림 및 시작 오버레이 복구]
var voiceOn = false;
function toggleVoice() {
  if (window.speechSynthesis) { var u = new SpeechSynthesisUtterance(''); window.speechSynthesis.speak(u); }
  voiceOn = !voiceOn;
  updateVoiceBtn();
  if (voiceOn) speak('음성 알림이 켜졌습니다');
}
function speak(t) { if(voiceOn && window.speechSynthesis) { var u = new SpeechSynthesisUtterance(t); u.lang='ko-KR'; window.speechSynthesis.speak(u); } }
function updateVoiceBtn() {
  var b = document.getElementById('voiceToggle'), l = document.getElementById('voiceLabel');
  if (voiceOn) { b.classList.add('on'); l.textContent = '음성 ON'; }
  else { b.classList.remove('on'); l.textContent = '음성 OFF'; }
}
function dismissStartOverlay() {
  document.getElementById('startOverlay').style.display = 'none';
  localStorage.setItem('overlayDismissDate', new Date().getTime());
  if (voiceOn) speak('준비되었습니다');
}

// [핵심 기능 초기화]
window.onload = function() {
  startOnlineTracking();
  updateVoiceBtn();
  var lastDismiss = parseInt(localStorage.getItem('overlayDismissDate') || '0');
  if (new Date().getTime() - lastDismiss > 86400000) {
    document.getElementById('startOverlay').style.display = 'flex';
  }
  // (나머지 렌더링 및 GPS 정류장 매칭 코드들...)
};
