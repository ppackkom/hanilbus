  :root{

  .admin-grid {display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;}
  .admin-btn-reset {grid-column: span 2; padding:12px; background:rgba(239,68,68,0.15); color:var(--red); border:1px solid var(--red); border-radius:10px; font-weight:700;}
  .admin-select {width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; margin-bottom:8px;}
  .admin-btn-save {width:100%; padding:12px; background:var(--teal); color:white; border:none; border-radius:8px; font-weight:700;}
  #coordList {background:var(--bg); padding:10px; border-radius:8px; font-size:10px; max-height:80px; overflow-y:auto; font-family:monospace; margin-top:10px; color:var(--text2);}

// 📍 [통합 GPS 엔진: 주소 기반 정류소 매칭]
function getGpsLocation() {
  var btn = document.getElementById('gpsBtn');
  btn.classList.add('loading'); btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ko`)
      .then(r => r.json()).then(data => {
        var addr = data.display_name || "";
        var match = findBestStopName(selectedRoute, addr);
        document.getElementById('locationInput').value = match || addr;
        showToast(match ? '🚏 정류장 자동 매칭 완료!' : '📍 주소를 입력했습니다');
        btn.classList.remove('loading'); btn.textContent = '📍';
      }).catch(() => { btn.classList.remove('loading'); btn.textContent = '📍'; showToast('검색 실패'); });
  }, () => { btn.classList.remove('loading'); btn.textContent = '📍'; showToast('위치 권한 필요'); });
}

function findBestStopName(route, address) {
  var pool = route ? [route] : Object.keys(BUS_STOPS_MASTER);
  for (var r of pool) {
    for (var s of BUS_STOPS_MASTER[r]) {
      var clean = s.replace(/앞|건너|\d번출구/g, '').trim();
      if (address.includes(clean) && clean.length > 1) return s;
    }
  } return null;
}

// 🛠️ [통합 관리자 모드 로직]
var tapCount = 0;
var savedCoords = [];

document.getElementById('adminTrigger').onclick = function() {
  tapCount++;
  if(tapCount >= 5) {
    document.getElementById('adminDashboard').style.display = 'block';
    showToast('🔓 관리자 모드가 활성화되었습니다');
    tapCount = 0;
  }
};

function loadAdmStops() {
  const route = document.getElementById('admRoute').value;
  document.getElementById('admStop').innerHTML = BUS_STOPS_MASTER[route].map(s => `<option value="${s}">${s}</option>`).join('');
}

function saveCoord() {
  const stop = document.getElementById('admStop').value;
  navigator.geolocation.getCurrentPosition(pos => {
    const data = `'${stop}': {lat:${pos.coords.latitude.toFixed(6)}, lon:${pos.coords.longitude.toFixed(6)}},`;
    savedCoords.push(data);
    document.getElementById('coordList').innerText = savedCoords.join('\n');
    alert(stop + ' 좌표가 기록되었습니다!');
  });
}

function copyCoords() {
  navigator.clipboard.writeText(savedCoords.join('\n')).then(() => alert('복사되었습니다! 저에게 전달해 주세요.'));
}

// ... 원본 index_1.html의 자바스크립트 내용을 여기에 이어서 붙이시면 됩니다.

window.onload = function() {
  // 관리자 도구 노선 목록 초기화
  document.getElementById('admRoute').innerHTML = Object.keys(BUS_STOPS_MASTER).map(r => `<option value="${r}">${r}번</option>`).join('');
  loadAdmStops();
  // 기존 초기화 함수 실행
  if(typeof startOnlineTracking === 'function') startOnlineTracking();
  if(typeof fetchWeather === 'function') fetchWeather();
};
