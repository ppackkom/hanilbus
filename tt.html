    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: white; }
        
        #loginScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1c; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { background-color: #2c2c2e; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #ff7f50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; margin-bottom: 10px; color: #eee; font-size: 18px; font-weight: bold; letter-spacing: 0.5px; } 
        .input-group select, .input-group input { width: 100%; padding: 18px; font-size: 20px; border-radius: 12px; border: 2px solid #444; background-color: #333; color: white; outline: none; box-sizing: border-box; transition: all 0.3s; font-weight: bold; } 
        .input-group input:focus, .input-group select:focus { border-color: #ff7f50; box-shadow: 0 0 10px rgba(255, 127, 80, 0.4); background-color: #3a3a3c; }
        .start-btn { background: linear-gradient(135deg, #ff7f50, #ff5722); color: white; border: none; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4); transition: transform 0.1s; } 
        .start-btn:active { transform: scale(0.97); }
        .install-btn { background-color: transparent; color: #ff7f50; border: 2px solid #ff7f50; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 15px; transition: all 0.2s; }
        .install-btn:active { background-color: rgba(255, 127, 80, 0.1); }

        #mapScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        
        #map { width: 100%; height: 100%; z-index: 1; transition: filter 1s ease; }
        .dark-map { filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(85%) grayscale(20%); }
        
        /* 💡 레이아웃 철벽 방어 코드 적용 */
        .header-overlay { position: absolute; top: 5px; left: 10px; right: 10px; z-index: 2; background-color: rgba(44, 44, 46, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 8px 10px; border-radius: 12px; border: 1px solid rgba(255, 127, 80, 0.5); box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 5px; box-sizing: border-box; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-bottom { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .header-info h2 { margin: 0; font-size: 22px; color: #ff7f50; cursor: pointer; white-space: nowrap; line-height: 1.1; } 
        .user-count { background-color: rgba(0, 204, 68, 0.2); color: #00cc44; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 15px; border: 1px solid #00cc44; white-space: nowrap; line-height: 1.1; }
        
        /* 💡 텍스트가 너무 길면 ... 으로 줄여서 버튼을 밀어내지 않게 보호! */
        .status-text { font-size: 15px; color: #ccc; white-space: nowrap; line-height: 1.1; font-weight: bold; flex: 1; overflow: hidden; text-overflow: ellipsis; margin-right: 5px; min-width: 0; } 
        
        /* 💡 버튼들은 절대 쪼그라들지 말고 버티게 세팅! */
        .btn-group { display: flex; gap: 6px; flex-shrink: 0; }
        .stop-btn { background-color: rgba(85, 85, 85, 0.8); color: white; border: 1px solid #777; padding: 6px 10px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.2s; white-space: nowrap; line-height: 1.1; } 
        .toggle-btn { background-color: rgba(0, 102, 255, 0.8); border-color: #005ce6; } 
        .fullscreen-btn { background-color: #444; border-color: #666; } 

        .marquee-wrapper { position: absolute; top: 135px; left: 10px; right: 10px; z-index: 2; overflow: hidden; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 5px 0; pointer-events: none; border: 1px solid rgba(255,255,255,0.1); }
        .marquee-text { display: inline-block; white-space: nowrap; font-size: 14px; color: #ffe600; font-weight: bold; animation: scroll-left 15s linear infinite; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        @keyframes scroll-left { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(26, 26, 28, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 12px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 5; border-top: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 -4px 15px rgba(0,0,0,0.4); }
        .status-select { background-color: rgba(26, 26, 28, 0.8); color: #00cc44; border: 2px solid #00cc44; padding: 10px; border-radius: 10px; font-size: 15px; font-weight: bold; outline: none; }
        .report-btn { background: linear-gradient(135deg, #ff4d4d, #cc0000); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4); transition: transform 0.1s; }
        .report-btn:active { transform: scale(0.95); }

        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: #2c2c2e; padding: 30px 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 360px; border: 1px solid #ff7f50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .modal-content h3 { color:#ff7f50; margin-top:0; margin-bottom:25px; font-size: 24px; font-weight: 900; }
        .modal-btn { width: 100%; padding: 20px; font-size: 22px; font-weight: 900; border-radius: 12px; border: none; color: white; margin-bottom: 15px; cursor: pointer; }

        .admin-section { margin-bottom: 20px; text-align: left; background: #1a1a1c; padding: 15px; border-radius: 10px; }
        .admin-section h4 { color: #00cc44; margin-top: 0; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .admin-input { width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .admin-small-btn { background: #005ce6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .log-list { max-height: 120px; overflow-y: auto; font-size: 13px; color: #ccc; line-height: 1.5; }

        #trackAlert { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 2; background: linear-gradient(135deg, rgba(0, 102, 255, 0.95), rgba(0, 70, 200, 0.95)); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 25px; text-align: center; display: none; box-shadow: 0 6px 15px rgba(0,0,0,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.3); min-width: 160px; }
        .dist-text { font-size: 22px; font-weight: bold; color: #ffe600; margin: 3px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .bus-label { color: white; padding: 6px 12px; border-radius: 15px; font-weight: bold; font-size: 13px; border: 2px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.4); white-space: nowrap; cursor: pointer; text-align: center; }
        .bus-label.jam { background-color: #ff4d4d; }
        .bus-label.slow { background-color: #ff9900; } 
        .bus-label.good { background-color: #00cc44; }
        .bus-label.break { background-color: #666; border-color: #aaa; color: #eee; } 
        .bus-label.my-bus { border: 3px solid #ffe600; box-shadow: 0 0 10px rgba(255, 230, 0, 0.6); z-index: 10; } 
        
        .incident-marker { background-color: rgba(255, 204, 0, 0.95); color: #cc0000; padding: 5px 10px; border-radius: 10px; font-weight: bold; font-size: 13px; border: 2px solid #cc0000; box-shadow: 0 4px 10px rgba(0,0,0,0.4); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        #myLocationBtn { display: none; position: absolute; bottom: 80px; right: 15px; z-index: 10; background: #00cc44; color: white; border: 2px solid white; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); cursor: pointer; text-align: center; line-height: 46px; }
        #myLocationBtn:active { transform: scale(0.95); }

        /* 💡 반응형 마법! 스마트폰(좁은 화면)에서는 크기를 알아서 줄여줍니다 */
        @media screen and (max-width: 600px) {
            .header-overlay { padding: 6px 8px; }
            .login-box h2 { font-size: 22px; } 
            .input-group label { font-size: 15px; } 
            .input-group select, .input-group input { font-size: 16px; padding: 15px; } 
            .start-btn { font-size: 18px; padding: 18px; } 

            .header-info h2 { font-size: 18px; } 
            .user-count { font-size: 12px; padding: 2px 6px; }
            .status-text { font-size: 13px; letter-spacing: -0.5px; } /* 여백을 촘촘하게 */
            .btn-group { gap: 4px; } /* 버튼 사이 간격 좁힘 */
            .stop-btn { padding: 5px 6px; font-size: 12px; letter-spacing: -0.5px; } /* 버튼 크기 최적화 */
            
            .marquee-wrapper { top: 115px; } /* 좁은 화면에서는 다시 황금비율 115px로! */

            .modal-content h3 { font-size: 20px; margin-bottom: 20px; }
            .modal-btn { font-size: 18px; padding: 15px; margin-bottom: 10px; }
            .modal-content .stop-btn { font-size: 16px; padding: 15px; }

<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>🚌 한일운수 스마트 상황판</h2>
            <div class="input-group">
                <label>📍 노선 선택</label>
                <select id="routeInput">
                    <option value="609" selected>609번</option>
                    <option value="204">204번</option>
                    <option value="894">894번</option>
                    <option value="937">937번</option>
                    <option value="dalseo6">달서6번</option>
                </select>
            </div>
            <div class="input-group">
                <label>🚍 차량 번호 (또는 순번)</label>
                <input type="text" id="vehicleInput" placeholder="예: 1988 또는 3호차">
            </div>
            <button class="start-btn" onclick="startApp()">🚀 운행 시작 (음성 안내)</button>
            <button id="installBtn" class="install-btn" onclick="installApp()">📲 스마트폰 바탕화면에 설치</button>
        </div>
    </div>

    <div id="mapScreen">
        <div class="header-overlay">
            <div class="header-top">
                <h2 id="myRouteInfo" onclick="handleAdminClick()">🗺️ 실시간 노선도</h2>
                <span class="user-count" id="userCount">👥 1명</span>
            </div>
            <div class="header-bottom">
                <div class="status-text"><span id="topStatus">GPS 연결 중... 📡</span></div>
                <div class="btn-group">
                    <button class="stop-btn fullscreen-btn" onclick="toggleFullScreen()">🔲 화면확대</button>
                    <button id="toggleRouteBtn" class="stop-btn toggle-btn" onclick="toggleRouteView()">🗺️ 전체 노선</button>
                    <button class="stop-btn" onclick="stopApp()">종료</button>
                </div>
            </div>
        </div>
        
        <div class="marquee-wrapper">
            <div class="marquee-text" id="mainMarqueeText">🚌 동료들과 함께 오늘도 안전운행! 식사 든든하게 챙겨 드시고, 무사고 화이팅입니다! 🚍</div>
        </div>

        <div id="trackAlert" onclick="cancelTracking()">
            <div id="trackTitle" style="font-size: 12px; color: white;">👀 앞차 추적 중</div>
            <div id="trackDist" class="dist-text">계산 중...</div>
            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">터치하여 해제</div>
        </div>
        
        <div id="map"></div>
        
        <div id="myLocationBtn" onclick="resumeTrackingMe()">🎯</div>

        <div class="bottom-bar">
            <select id="myManualStatus" class="status-select" onchange="updateManualStatus()">
                <option value="운행 중" selected>🟢 운행 중</option>
                <option value="가스 충전">⛽ 가스 충전</option>
                <option value="식사/휴식">🍚 식사/휴식</option>
                <option value="차량 고장">🔧 차량 고장</option> 
            </select>
            <button class="report-btn" onclick="openIncidentModal()">🚨 돌발상황 제보</button>
        </div>
    </div>

    <div id="incidentModal" class="modal-overlay">
        <div class="modal-content">
            <h3>🚨 상황을 선택해주세요</h3>
            <button class="modal-btn" style="background:#ff9900;" onclick="submitIncident('정체')">🚗 정체</button>
            <button class="modal-btn" style="background:#ff4d4d;" onclick="submitIncident('공사중')">🚧 공사중</button>
            <button class="modal-btn" style="background:#cc0000;" onclick="submitIncident('사고')">💥 사고</button>
            <button class="stop-btn" style="width:100%; padding:20px; margin-top:5px; font-size:20px; font-weight:900; border-radius:12px;" onclick="closeIncidentModal()">취소</button>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <h3 style="color:#00cc44;">👑 최고 관리자 모드</h3>
            
            <div class="admin-section">
                <h4>📝 전광판 문구 실시간 변경</h4>
                <input type="text" id="adminMarqueeInput" class="admin-input" placeholder="새로운 전광판 문구 입력">
                <button class="admin-small-btn" onclick="saveMarqueeText()">전광판 띄우기 🚀</button>
            </div>

            <div class="admin-section">
                <h4>📋 오늘 접속 차량 명단 (출근부)</h4>
                <div id="dailyLogList" class="log-list">기록을 불러오는 중...</div>
            </div>

            <div class="admin-section">
                <h4>🧹 서버 관리</h4>
                <button class="admin-small-btn" style="background:#cc0000;" onclick="cleanUpGhostBuses()">유령 버스(에러 데이터) 삭제</button>
            </div>

            <button class="stop-btn" style="width:100%; padding:15px; font-size:18px; border-radius:12px;" onclick="closeAdminModal()">닫기</button>
        </div>
    </div>
