        if (navigator.userAgent.indexOf('KAKAOTALK') > -1) {

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: white; }
        
        /* 💡 로그인 화면 디자인 럭셔리 튜닝 */
        #loginScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1c; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { background-color: #2c2c2e; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #ff7f50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: #ff7f50; margin-top: 0; margin-bottom: 30px; font-size: 22px; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; margin-bottom: 10px; color: #eee; font-size: 15px; font-weight: bold; letter-spacing: 0.5px; }
        .input-group select, .input-group input { width: 100%; padding: 15px; font-size: 16px; border-radius: 12px; border: 2px solid #444; background-color: #333; color: white; outline: none; box-sizing: border-box; transition: all 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: #ff7f50; box-shadow: 0 0 10px rgba(255, 127, 80, 0.4); background-color: #3a3a3c; }
        
        .start-btn { background: linear-gradient(135deg, #ff7f50, #ff5722); color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4); transition: transform 0.1s; }
        .start-btn:active { transform: scale(0.97); }
        
        /* 💡 홈 화면 설치 전용 버튼 디자인 */
        .install-btn { background-color: transparent; color: #ff7f50; border: 2px solid #ff7f50; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 15px; transition: all 0.2s; }
        .install-btn:active { background-color: rgba(255, 127, 80, 0.1); }

        #mapScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        .header-overlay { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 2; background-color: rgba(44, 44, 46, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255, 127, 80, 0.5); box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 8px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-bottom { display: flex; justify-content: space-between; align-items: center; }
        
        .header-info h2 { margin: 0; font-size: 17px; color: #ff7f50; cursor: pointer; white-space: nowrap; } 
        .user-count { background-color: rgba(0, 204, 68, 0.2); color: #00cc44; padding: 3px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; border: 1px solid #00cc44; white-space: nowrap; }
        .status-text { font-size: 13px; color: #ccc; white-space: nowrap; }
        
        .btn-group { display: flex; gap: 6px; }
        .stop-btn { background-color: rgba(85, 85, 85, 0.8); color: white; border: 1px solid #777; padding: 7px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .toggle-btn { background-color: rgba(0, 102, 255, 0.8); border-color: #005ce6; } 
        .fullscreen-btn { background-color: #444; border-color: #666; } 
        
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(26, 26, 28, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 12px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 5; border-top: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 -4px 15px rgba(0,0,0,0.4); }
        .status-select { background-color: rgba(26, 26, 28, 0.8); color: #00cc44; border: 2px solid #00cc44; padding: 10px; border-radius: 10px; font-size: 15px; font-weight: bold; outline: none; }
        .report-btn { background: linear-gradient(135deg, #ff4d4d, #cc0000); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4); transition: transform 0.1s; }
        .report-btn:active { transform: scale(0.95); }

        #trackAlert { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 2; background: linear-gradient(135deg, rgba(0, 102, 255, 0.95), rgba(0, 70, 200, 0.95)); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 25px; text-align: center; display: none; box-shadow: 0 6px 15px rgba(0,0,0,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.3); min-width: 160px; }
        .dist-text { font-size: 22px; font-weight: bold; color: #ffe600; margin: 3px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .bus-label { color: white; padding: 6px 12px; border-radius: 15px; font-weight: bold; font-size: 13px; border: 2px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.4); white-space: nowrap; cursor: pointer; text-align: center; }
        .bus-label.jam { background-color: #ff4d4d; }
        .bus-label.good { background-color: #00cc44; }
        .bus-label.break { background-color: #666; border-color: #aaa; color: #eee; } 
        .bus-label.my-bus { border: 3px solid #ffe600; box-shadow: 0 0 10px rgba(255, 230, 0, 0.6); z-index: 10; } 
        
        .incident-marker { background-color: rgba(255, 204, 0, 0.95); color: #cc0000; padding: 5px 10px; border-radius: 10px; font-weight: bold; font-size: 13px; border: 2px solid #cc0000; box-shadow: 0 4px 10px rgba(0,0,0,0.4); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>🚌 한일운수 스마트 상황판</h2>
            <div class="input-group">
                <label>📍 노선 선택</label>
                <select id="routeInput">
                    <option value="609" selected>609번</option>
                    <option value="204">204번</option>
                    <option value="894">894번</option>
                    <option value="937">937번</option>
                    <option value="dalseo6">달서6번</option>
                </select>
            </div>
            <div class="input-group">
                <label>🚍 차량 번호 (또는 순번)</label>
                <input type="text" id="vehicleInput" placeholder="예: 1988 또는 3호차">
            </div>
            <button class="start-btn" onclick="startApp()">🚀 운행 시작 (음성 안내)</button>
            
            <button id="installBtn" class="install-btn" onclick="installApp()">📲 스마트폰 바탕화면에 설치</button>
        </div>
    </div>

    <div id="mapScreen">
        <div class="header-overlay">
            <div class="header-top">
                <h2 id="myRouteInfo" onclick="handleAdminClick()">🗺️ 실시간 노선도</h2>
                <span class="user-count" id="userCount">👥 1명</span>
            </div>
            <div class="header-bottom">
                <div class="status-text"><span id="topStatus">GPS 연결 중... 📡</span></div>
                <div class="btn-group">
                    <button class="stop-btn fullscreen-btn" onclick="toggleFullScreen()">🔲 화면확대</button>
                    <button id="toggleRouteBtn" class="stop-btn toggle-btn" onclick="toggleRouteView()">🗺️ 전체 노선</button>
                    <button class="stop-btn" onclick="stopApp()">종료</button>
                </div>
            </div>
        </div>
        
        <div id="trackAlert" onclick="cancelTracking()">
            <div id="trackTitle" style="font-size: 12px; color: white;">👀 앞차 추적 중</div>
            <div id="trackDist" class="dist-text">계산 중...</div>
            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">터치하여 해제</div>
        </div>
        
        <div id="map"></div>

        <div class="bottom-bar">
            <select id="myManualStatus" class="status-select" onchange="updateManualStatus()">
                <option value="운행 중" selected>🟢 운행 중</option>
                <option value="가스 충전">⛽ 가스 충전</option>
                <option value="식사/휴식">🍚 식사/휴식</option>
                <option value="차량 고장">🔧 차량 고장</option> 
            </select>
            <button class="report-btn" onclick="reportIncident()">🚨 돌발상황 제보</button>
        </div>
    </div>

    <script>
            // 💡 스마트폰에 앱 증명서(Service Worker) 제출!
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function() {
                console.log('앱 증명서 등록 성공!');
            });
        }

        // 💡 [홈 화면 설치 기능] 브라우저 설치 이벤트를 잡아둡니다.
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // 💡 버튼을 눌렀을 때 실행되는 설치 함수
        function installApp() {
            if (deferredPrompt) {
                // 안드로이드 등 설치 지원 기기
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('사용자가 홈 화면 설치를 수락했습니다.');
                    }
                    deferredPrompt = null;
                });
            } else {
                // 아이폰 등 설치 팝업을 지원하지 않는 기기용 친절한 안내
                alert("현재 인터넷 창에서는 자동 설치 팝업을 띄울 수 없습니다.\n\n화면 우측 상단(점 3개) 또는 하단 메뉴에서\n[홈 화면에 추가] 버튼을 직접 눌러주세요!");
            }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCKXl4AYBlrotyF3VHv6Gr0GP-p1ii4Bww",
            authDomain: "hanilbus-760ae.firebaseapp.com",
            databaseURL: "https://hanilbus-760ae-default-rtdb.firebaseio.com/",
            projectId: "hanilbus-760ae",
            storageBucket: "hanilbus-760ae.firebasestorage.app",
            messagingSenderId: "454505545954",
            appId: "1:454505545954:web:a1951147f2b4b34d019ebb"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let map, geocoder, wakeLock = null;
        let watchId = null, serverTimer = null;
        let myRoute = "", myVehicle = "", myBusId = "";
        let currentLat = 0, currentLon = 0, currentSpeed = 0, manualStatus = "운행 중";
        let currentStatusText = "대기중";
        
        let busMarkers = {};
        let incidentMarkers = {}; 
        let tailPolylines = []; 
        let trackingBusId = null; 

        let appStartTime = Date.now();
        let announcedIncidents = new Set();
        let lastTrackedStatus = "";
        let tooCloseWarned = false;
        let lastTailTime = 0; 
        let stopStartTime = null; 

        let showAllRoutes = false; 
        let lastFirebaseData = null; 

        let adminClickCount = 0;
        let adminClickTimer = null;

        const liveConnectionsRef = database.ref('live_connections');
        const connectedRef = database.ref('.info/connected');
        let myConnectionKey = null;

        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                const con = liveConnectionsRef.push();
                myConnectionKey = con.key;
                con.onDisconnect().remove(); 
                con.set(true);
            }
        });

        liveConnectionsRef.on('value', (snap) => {
            const count = snap.numChildren() || 1;
            document.getElementById('userCount').innerText = `👥 ${count}명`;
        });

                // 💡 (차분한 목소리 + 횟수 조절)
        function speakText(text, repeat = 2) {
            if (!window.speechSynthesis) return;
            const synth = window.speechSynthesis;
            let koVoice = synth.getVoices().find(v => v.lang.includes('ko') && (v.name.includes('Female') || v.name.includes('Yuna') || v.name.includes('Google')));
            if (!koVoice) koVoice = synth.getVoices().find(v => v.lang.includes('ko'));

            for (let i = 0; i < repeat; i++) {
                let utterance = new SpeechSynthesisUtterance(text);
                if (koVoice) utterance.voice = koVoice;
                utterance.lang = 'ko-KR'; 
                utterance.rate = 0.9; 
                utterance.pitch = 1.0; //
                synth.speak(utterance);
            }
        }


        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function requestWakeLock() { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            }
        }

        function startApp() {
            myRoute = document.getElementById('routeInput').value;
            myVehicle = document.getElementById('vehicleInput').value.trim();
            if (myVehicle === "") { alert("차량 번호를 입력해주세요!"); return; }
            
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            
            myBusId = myRoute + "_" + myVehicle;
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mapScreen').style.display = 'block';
            document.getElementById('myRouteInfo').innerText = `🗺️ ${myRoute}번 [${myVehicle}]`;

            database.ref('live_buses/' + myBusId).onDisconnect().remove();
            database.ref('live_tails/' + myBusId).onDisconnect().remove();

            if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            requestWakeLock(); initMap(); startGPS(); startReceivingData(); loadIncidents(); loadTails(); 
            serverTimer = setInterval(sendMyLocation, 5000);
            setTimeout(() => { speakText("오빠야. 오늘도 안전운전 해레이.", 1); }, 1000);
        }

        function initMap() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = { center: new kakao.maps.LatLng(35.8714, 128.6014), level: 5 };
            map = new kakao.maps.Map(mapContainer, mapOption);
            kakao.maps.event.addListener(map, 'dragstart', function() { cancelTracking(); });
            geocoder = new kakao.maps.services.Geocoder(); 
        }

        function toggleRouteView() {
            showAllRoutes = !showAllRoutes;
            const btn = document.getElementById('toggleRouteBtn');
            if(showAllRoutes) {
                btn.innerText = "🚌 내 노선만";
                btn.style.backgroundColor = "#ff9900"; 
                btn.style.borderColor = "#cc7a00";
            } else {
                btn.innerText = "🗺️ 전체 노선";
                btn.style.backgroundColor = "rgba(0, 102, 255, 0.8)"; 
                btn.style.borderColor = "#005ce6";
            }
            if(lastFirebaseData) renderBuses(lastFirebaseData);
        }

        function handleAdminClick() {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            if (adminClickCount >= 5) { cleanUpGhostBuses(); adminClickCount = 0; } 
            else { adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000); }
        }

        function cleanUpGhostBuses() {
            if(!confirm("⚠️ [관리자 전용] 서버의 모든 유령 버스(오래된 데이터)를 강제 삭제하시겠습니까?")) return;
            database.ref('live_buses').once('value', snap => {
                let data = snap.val();
                if(!data) { alert("현재 지도에 등록된 버스가 없습니다."); return; }
                let now = Date.now(); let deletedCount = 0;
                for(let key in data) {
                    let bus = data[key];
                    if(!bus.last_update_ms || (now - bus.last_update_ms > 600000)) {
                        database.ref('live_buses/' + key).remove(); database.ref('live_tails/' + key).remove(); deletedCount++;
                    }
                }
                alert(`🧹 서버 청소 완료!\n총 ${deletedCount}대의 유령 버스를 삭제했습니다.`);
            });
        }

        function updateManualStatus() {
            const selectBox = document.getElementById('myManualStatus');
            manualStatus = selectBox.value;
            if(manualStatus === "운행 중") { selectBox.style.color = "#00cc44"; selectBox.style.borderColor = "#00cc44"; currentStatusText = (currentSpeed <= 20) ? "정체/서행" : "정상 주행"; } 
            else { selectBox.style.color = "#ffcc00"; selectBox.style.borderColor = "#ffcc00"; currentStatusText = manualStatus; }
            sendMyLocation(); 
        }

        function reportIncident() {
            if (currentLat === 0) return;
            if (confirm("현재 위치에 돌발상황을 제보하시겠습니까?")) { database.ref('live_incidents').push({ route: myRoute, lat: currentLat, lon: currentLon, time: new Date().toLocaleTimeString(), timestamp_ms: Date.now() }); }
        }

        function startGPS() {
            if (!("geolocation" in navigator)) return;
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    currentLat = position.coords.latitude; currentLon = position.coords.longitude; currentSpeed = Math.round((position.coords.speed || 0) * 3.6);
                    if (manualStatus === "운행 중") currentStatusText = (currentSpeed <= 20) ? "정체/서행" : "정상 주행";
                    else currentStatusText = manualStatus;

                    document.getElementById('topStatus').innerText = `내 속도: ${currentSpeed}km/h`;
                    if (trackingBusId === null && busMarkers[myBusId] === undefined) map.panTo(new kakao.maps.LatLng(currentLat, currentLon));
                }, 
                function(error) {}, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function sendMyLocation() {
            if (currentLat === 0) return;
            let now = Date.now();

            if (currentSpeed <= 3 && manualStatus === "운행 중") { if (!stopStartTime) stopStartTime = now; } 
            else { stopStartTime = null; }

            database.ref('live_buses/' + myBusId).set({
                route: myRoute, vehicle: myVehicle, status: currentStatusText, speed: currentSpeed, lat: currentLat, lon: currentLon, 
                timestamp: new Date().toLocaleTimeString(), last_update_ms: now, stopStartTime: stopStartTime 
            });

            if (now - lastTailTime > 15000) {
                database.ref('live_tails/' + myBusId).push({ lat: currentLat, lon: currentLon, speed: currentSpeed, time: now });
                lastTailTime = now;
                let cutoff = now - 1800000;
                database.ref('live_tails/' + myBusId).orderByChild('time').endAt(cutoff).once('value', snapshot => { snapshot.forEach(child => { child.ref.remove(); }); });
            }
        }

        function startReceivingData() {
            database.ref('live_buses').on('value', (snapshot) => { lastFirebaseData = snapshot.val(); renderBuses(lastFirebaseData); });
        }

        function renderBuses(data) {
            let nowMs = Date.now();

            for (const key in busMarkers) { if (!data || !data[key]) { busMarkers[key].setMap(null); delete busMarkers[key]; } }
            if (!data) return;

            for (const key in data) {
                const bus = data[key];
                if (!bus.last_update_ms || (nowMs - bus.last_update_ms > 600000)) { if (busMarkers[key]) { busMarkers[key].setMap(null); delete busMarkers[key]; } continue; }
                if (!showAllRoutes && bus.route !== myRoute && key !== myBusId) { if (busMarkers[key]) { busMarkers[key].setMap(null); } continue; }

                if (bus.lat && bus.lon) {
                    const pos = new kakao.maps.LatLng(bus.lat, bus.lon);
                    let isMyBus = (key === myBusId) ? " my-bus" : "";
                    let labelColor = "good"; let displayStatus = `${bus.speed}km/h`; let stopTimerText = ""; 
                    
                    if (bus.status.includes("정체")) labelColor = "jam";
                    if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") { labelColor = "break"; displayStatus = bus.status; }
                    
                    if (bus.stopStartTime && bus.speed <= 3 && bus.status === "정체/서행") {
                        let diffSec = Math.floor((nowMs - bus.stopStartTime) / 1000);
                        if (diffSec >= 60) { let stopMins = Math.floor(diffSec / 60); stopTimerText = `<br><span style="color:#ffe6e6; font-size:11px;">⏱️ ${stopMins}분째 정차중</span>`; labelColor = "jam"; }
                    }
                    
                    let contentHtml = document.createElement('div');
                    contentHtml.className = `bus-label ${labelColor}${isMyBus}`;
                    contentHtml.innerHTML = `🚍 ${bus.route}번 [${bus.vehicle}]<br><span style="font-size:11px; font-weight:normal;">${displayStatus}</span>${stopTimerText}`;
                    contentHtml.onclick = () => { startTrackingBus(key, bus.route, bus.vehicle); };

                    if (busMarkers[key]) {
                        busMarkers[key].setMap(map); busMarkers[key].setPosition(pos); busMarkers[key].setContent(contentHtml);
                        if(isMyBus) busMarkers[key].setZIndex(20);
                    } else {
                        const overlay = new kakao.maps.CustomOverlay({ position: pos, content: contentHtml, yAnchor: 1.2 });
                        overlay.setMap(map); busMarkers[key] = overlay;
                        if(isMyBus) overlay.setZIndex(20);
                    }

                    if (trackingBusId === key && currentLat !== 0) {
                        const distInMeters = getDistance(currentLat, currentLon, bus.lat, bus.lon);
                        if (lastTrackedStatus !== bus.status) {
                            if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") { speakText(`앞차가, ${bus.status} 상태로 변경되었습니다.`); } 
                            else if (bus.status.includes("정체") && !lastTrackedStatus.includes("정체")) { geocoder.coord2RegionCode(bus.lon, bus.lat, function(result, status) { if (status === kakao.maps.services.Status.OK) { speakText(`앞차가, ${result[0].region_3depth_name} 부근에서 정체 중입니다.`); } }); }
                            lastTrackedStatus = bus.status;
                        }
                        if (distInMeters < 300) { if (!tooCloseWarned) { speakText("주의, 앞차와의 간격이 너무 가깝습니다."); tooCloseWarned = true; } } else if (distInMeters > 500) { tooCloseWarned = false; }
                        let distText = distInMeters >= 1000 ? (distInMeters / 1000).toFixed(1) + " km" : distInMeters + " m";
                        document.getElementById('trackTitle').innerText = `👀 ${bus.route}번 [${bus.vehicle}] 앞차 간격`; document.getElementById('trackDist').innerText = distText;
                        const bounds = new kakao.maps.LatLngBounds(); bounds.extend(new kakao.maps.LatLng(currentLat, currentLon)); bounds.extend(pos); map.setBounds(bounds, 50, 50, 50, 50); 
                    }
                }
            }
        }

        function loadTails() {
            database.ref('live_tails').on('value', (snapshot) => {
                tailPolylines.forEach(line => line.setMap(null)); tailPolylines = [];
                let data = snapshot.val(); if (!data) return;
                let now = Date.now(); let cutoff = now - 1800000; 

                for (let busId in data) {
                    let busRoute = busId.split('_')[0];
                    if (!showAllRoutes && busRoute !== myRoute && busId !== myBusId) continue;

                    let points = Object.values(data[busId]).filter(p => p.time > cutoff).sort((a,b) => a.time - b.time);
                    if (points.length < 2) continue;

                    for (let i = 1; i < points.length; i++) {
                        let p1 = points[i-1]; let p2 = points[i];
                        if (p2.time - p1.time > 300000) continue;
                        let lineColor = p2.speed <= 20 ? '#ff4d4d' : '#00cc44';
                        let polyline = new kakao.maps.Polyline({ path: [new kakao.maps.LatLng(p1.lat, p1.lon), new kakao.maps.LatLng(p2.lat, p2.lon)], strokeWeight: 6, strokeColor: lineColor, strokeOpacity: 0.7, strokeStyle: 'solid' });
                        polyline.setMap(map); tailPolylines.push(polyline);
                    }
                }
            });
        }

        function loadIncidents() {
            database.ref('live_incidents').on('value', (snapshot) => {
                for(let k in incidentMarkers) incidentMarkers[k].setMap(null); incidentMarkers = {};
                const data = snapshot.val(); if(data) {
                    const now = Date.now();
                    for(let key in data) {
                        const inc = data[key]; if (now - inc.timestamp_ms > 7200000) continue; 
                        if (!showAllRoutes && inc.route !== myRoute) continue;

                        if (inc.timestamp_ms > appStartTime && !announcedIncidents.has(key)) { announcedIncidents.add(key); speakText("전방에, 새로운 돌발 상황이 제보되었습니다."); }
                        const pos = new kakao.maps.LatLng(inc.lat, inc.lon); const content = `<div class="incident-marker">⚠️ 돌발상황<br><span style="font-size:10px;">${inc.time}</span></div>`;
                        const overlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1, zIndex: 15 });
                        overlay.setMap(map); incidentMarkers[key] = overlay;
                    }
                }
            });
        }

        function startTrackingBus(busKey, route, vehicle) { if (busKey === myBusId) { alert("내 차를 추적할 수는 없습니다!"); return; } trackingBusId = busKey; lastTrackedStatus = ""; tooCloseWarned = false; document.getElementById('trackAlert').style.display = 'block'; speakText(`${route}번 버스 추적을 시작합니다.`); }
        function cancelTracking() { trackingBusId = null; document.getElementById('trackAlert').style.display = 'none'; }
        
        function stopApp() {
            if (confirm("운행을 종료하고 앱을 닫으시겠습니까?")) {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                if (myBusId) { database.ref('live_buses/' + myBusId).remove(); database.ref('live_tails/' + myBusId).remove(); }
                if (myConnectionKey) liveConnectionsRef.child(myConnectionKey).remove();
                window.location.reload(); 
            }
        }
    </script>
</body>
