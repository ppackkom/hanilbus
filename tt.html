<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한일운수 스마트 상황판</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ebd0806246b5a31d27d9f53ac6cf7801&libraries=services"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: white; }
        #loginScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1c; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { background-color: #2c2c2e; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; border: 2px solid #ff7f50; }
        .login-box h2 { color: #ff7f50; margin-top: 0; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px; }
        .input-group select, .input-group input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: none; background-color: #333; color: white; outline: none; box-sizing: border-box; }
        .start-btn { background-color: #ff7f50; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        #mapScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .header-overlay { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 2; background-color: rgba(44, 44, 46, 0.9); padding: 15px; border-radius: 10px; border: 1px solid #ff7f50; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .header-info h2 { margin: 0 0 5px 0; font-size: 18px; color: #ff7f50; }
        .status-text { font-size: 13px; color: #ccc; }
        .stop-btn { background-color: #555; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(30, 30, 30, 0.95); padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 5; border-top: 2px solid #444; }
        .status-select { background-color: #1a1a1c; color: #00cc44; border: 2px solid #00cc44; padding: 10px; border-radius: 8px; font-size: 16px; font-weight: bold; outline: none; }
        .report-btn { background-color: #ff4d4d; color: white; border: 2px solid #cc0000; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .report-btn:active { background-color: #cc0000; }

        #trackAlert { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 2; background-color: rgba(0, 102, 255, 0.9); padding: 10px 20px; border-radius: 30px; text-align: center; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; border: 2px solid white; min-width: 180px; }
        .dist-text { font-size: 22px; font-weight: bold; color: #ffe600; margin: 3px 0; }

        .bus-label { color: white; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); white-space: nowrap; cursor: pointer; text-align: center; }
        .bus-label.jam { background-color: #ff4d4d; }
        .bus-label.good { background-color: #00cc44; }
        .bus-label.break { background-color: #777; border-color: #aaa; color: #fff; } 
        .bus-label.my-bus { border: 3px solid #ffe600; } 
        
        .incident-marker { background-color: #ffcc00; color: #cc0000; padding: 5px 10px; border-radius: 10px; font-weight: bold; font-size: 14px; border: 2px solid #cc0000; box-shadow: 0 2px 5px rgba(0,0,0,0.5); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>🚌 한일운수 스마트 상황판</h2>
            <div class="input-group">
                <label>노선 선택</label>
                <select id="routeInput">
                    <option value="609" selected>609번</option>
                    <option value="204">204번</option>
                    <option value="894">894번</option>
                    <option value="937">937번</option>
                    <option value="dalseo6">달서6번</option>
                </select>
            </div>
            <div class="input-group">
                <label>차량 번호 (또는 순번)</label>
                <input type="text" id="vehicleInput" placeholder="예: 1234 또는 3호차">
            </div>
            <button class="start-btn" onclick="startApp()">🚀 운행 시작 (음성 안내 켜기)</button>
        </div>
    </div>

    <div id="mapScreen">
        <div class="header-overlay">
            <div class="header-info">
                <h2 id="myRouteInfo">🗺️ 실시간 노선도</h2>
                <div class="status-text" id="topStatus">GPS 연결 중... 📡</div>
            </div>
            <button class="stop-btn" onclick="stopApp()">운행 종료</button>
        </div>
        
        <div id="trackAlert" onclick="cancelTracking()">
            <div id="trackTitle" style="font-size: 13px; color: white;">👀 앞차 추적 중</div>
            <div id="trackDist" class="dist-text">계산 중...</div>
            <div style="font-size: 11px; color: #ccc;">터치하여 해제</div>
        </div>
        
        <div id="map"></div>

        <div class="bottom-bar">
            <select id="myManualStatus" class="status-select" onchange="updateManualStatus()">
                <option value="운행 중" selected>🟢 운행 중</option>
                <option value="가스 충전">⛽ 가스 충전</option>
                <option value="식사/휴식">🍚 식사/휴식</option>
                <option value="차량 고장">🔧 차량 고장</option> 
            </select>
            <button class="report-btn" onclick="reportIncident()">🚨 돌발상황 제보</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKXl4AYBlrotyF3VHv6Gr0GP-p1ii4Bww",
            authDomain: "hanilbus-760ae.firebaseapp.com",
            databaseURL: "https://hanilbus-760ae-default-rtdb.firebaseio.com/",
            projectId: "hanilbus-760ae",
            storageBucket: "hanilbus-760ae.firebasestorage.app",
            messagingSenderId: "454505545954",
            appId: "1:454505545954:web:a1951147f2b4b34d019ebb"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let map, geocoder, wakeLock = null;
        let watchId = null, serverTimer = null;
        let myRoute = "", myVehicle = "", myBusId = "";
        let currentLat = 0, currentLon = 0, currentSpeed = 0, manualStatus = "운행 중";
        let currentStatusText = "대기중";
        
        let busMarkers = {};
        let incidentMarkers = {}; 
        let trackingBusId = null; 

        let appStartTime = Date.now();
        let announcedIncidents = new Set();
        let lastTrackedStatus = "";
        let tooCloseWarned = false;

        function speakText(text) {
            if (!window.speechSynthesis) return;
            const synth = window.speechSynthesis;
            const voices = synth.getVoices();
            
            let koVoice = voices.find(v => v.lang.includes('ko') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Yuna') || v.name.includes('Siri')));
            if (!koVoice) koVoice = voices.find(v => v.lang.includes('ko'));

            for (let i = 0; i < 2; i++) {
                let utterance = new SpeechSynthesisUtterance(text);
                if (koVoice) utterance.voice = koVoice;
                utterance.lang = 'ko-KR';
                utterance.rate = 0.9; 
                utterance.pitch = 1.1; 
                synth.speak(utterance);
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function requestWakeLock() { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }

        function startApp() {
            myRoute = document.getElementById('routeInput').value;
            myVehicle = document.getElementById('vehicleInput').value.trim();
            if (myVehicle === "") { alert("차량 번호를 입력해주세요!"); return; }
            
            myBusId = myRoute + "_" + myVehicle;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mapScreen').style.display = 'block';
            document.getElementById('myRouteInfo').innerText = `🗺️ ${myRoute}번 (${myVehicle})`;

            if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            requestWakeLock();
            initMap();
            startGPS();
            startReceivingData();
            loadIncidents(); 
            serverTimer = setInterval(sendMyLocation, 5000);
            
            setTimeout(() => { speakText("안전 운행을 시작합니다."); }, 1000);
        }

        function initMap() {
            const mapContainer = document.getElementById('map'); 
            const mapOption = { center: new kakao.maps.LatLng(35.8714, 128.6014), level: 5 };
            map = new kakao.maps.Map(mapContainer, mapOption);
            kakao.maps.event.addListener(map, 'dragstart', function() { cancelTracking(); });
            geocoder = new kakao.maps.services.Geocoder(); 
        }

        // 💡 [버그 픽스] 상태를 바꾸자마자 내부 상태값도 즉시 바꾸고 바로 전송하도록 수정했습니다!
        function updateManualStatus() {
            const selectBox = document.getElementById('myManualStatus');
            manualStatus = selectBox.value;
            
            if(manualStatus === "운행 중") {
                selectBox.style.color = "#00cc44"; selectBox.style.borderColor = "#00cc44";
                currentStatusText = (currentSpeed <= 20) ? "정체/서행" : "정상 주행";
            } else {
                selectBox.style.color = "#ffcc00"; selectBox.style.borderColor = "#ffcc00";
                currentStatusText = manualStatus; // 즉각적으로 '차량 고장' 등 반영
            }
            sendMyLocation(); // 버튼 누르는 즉시 서버로 발사!
        }

        function reportIncident() {
            if (currentLat === 0) return;
            if (confirm("현재 위치에 돌발상황을 제보하시겠습니까?")) {
                database.ref('live_incidents').push({
                    route: myRoute, lat: currentLat, lon: currentLon,
                    time: new Date().toLocaleTimeString(), timestamp_ms: Date.now()
                });
            }
        }

        function startGPS() {
            if (!("geolocation" in navigator)) return;
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    currentLat = position.coords.latitude;
                    currentLon = position.coords.longitude;
                    currentSpeed = Math.round((position.coords.speed || 0) * 3.6);
                    
                    if (manualStatus === "운행 중") {
                        currentStatusText = (currentSpeed <= 20) ? "정체/서행" : "정상 주행";
                    } else {
                        currentStatusText = manualStatus;
                    }

                    document.getElementById('topStatus').innerText = `내 속도: ${currentSpeed}km/h | 수신 중 📡`;
                    if (trackingBusId === null && busMarkers[myBusId] === undefined) {
                        map.panTo(new kakao.maps.LatLng(currentLat, currentLon));
                    }
                }, 
                function(error) {}, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function sendMyLocation() {
            if (currentLat !== 0) {
                database.ref('live_buses/' + myBusId).set({
                    route: myRoute, vehicle: myVehicle, status: currentStatusText,
                    speed: currentSpeed, lat: currentLat, lon: currentLon, timestamp: new Date().toLocaleTimeString()
                });
            }
        }

        function startReceivingData() {
            database.ref('live_buses').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    for (const key in data) {
                        const bus = data[key];
                        if (bus.lat && bus.lon) {
                            const pos = new kakao.maps.LatLng(bus.lat, bus.lon);
                            let isMyBus = (key === myBusId) ? " my-bus" : "";
                            let labelColor = "good";
                            let displayStatus = `${bus.speed}km/h`; 
                            
                            if (bus.status.includes("정체")) labelColor = "jam";
                            // 💡 여기서 '차량 고장'을 제대로 회색으로 만들도록 조건을 맞췄습니다!
                            if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") {
                                labelColor = "break"; displayStatus = bus.status; 
                            }
                            
                            let contentHtml = document.createElement('div');
                            contentHtml.className = `bus-label ${labelColor}${isMyBus}`;
                            contentHtml.innerHTML = `🚍 ${bus.route}번 [${bus.vehicle}]<br><span style="font-size:11px; font-weight:normal;">${displayStatus}</span>`;
                            contentHtml.onclick = () => { startTrackingBus(key, bus.route, bus.vehicle); };

                            if (busMarkers[key]) {
                                busMarkers[key].setPosition(pos);
                                busMarkers[key].setContent(contentHtml);
                            } else {
                                const overlay = new kakao.maps.CustomOverlay({ position: pos, content: contentHtml, yAnchor: 1.2 });
                                overlay.setMap(map);
                                busMarkers[key] = overlay;
                            }

                            if (trackingBusId === key && currentLat !== 0) {
                                const distInMeters = getDistance(currentLat, currentLon, bus.lat, bus.lon);
                                
                                if (lastTrackedStatus !== bus.status) {
                                    // 💡 앞차 알림 멘트에도 '차량 고장'을 추가했습니다!
                                    if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") {
                                        speakText(`앞차가, ${bus.status} 상태로 변경되었습니다.`);
                                    } 
                                    else if (bus.status.includes("정체") && !lastTrackedStatus.includes("정체")) {
                                        geocoder.coord2RegionCode(bus.lon, bus.lat, function(result, status) {
                                            if (status === kakao.maps.services.Status.OK) {
                                                let dongName = result[0].region_3depth_name; 
                                                speakText(`앞차가, ${dongName} 부근에서 정체 중입니다.`);
                                            }
                                        });
                                    }
                                    lastTrackedStatus = bus.status;
                                }

                                if (distInMeters < 300) {
                                    if (!tooCloseWarned) {
                                        speakText("주의, 앞차와의 간격이 너무 가깝습니다.");
                                        tooCloseWarned = true;
                                    }
                                } else if (distInMeters > 500) {
                                    tooCloseWarned = false; 
                                }

                                let distText = distInMeters >= 1000 ? (distInMeters / 1000).toFixed(1) + " km" : distInMeters + " m";
                                document.getElementById('trackTitle').innerText = `👀 ${bus.route}번 [${bus.vehicle}] 앞차 간격`;
                                document.getElementById('trackDist').innerText = distText;
                                const bounds = new kakao.maps.LatLngBounds();
                                bounds.extend(new kakao.maps.LatLng(currentLat, currentLon)); 
                                bounds.extend(pos); 
                                map.setBounds(bounds, 50, 50, 50, 50); 
                            }
                        }
                    }
                }
            });
        }

        function loadIncidents() {
            database.ref('live_incidents').on('value', (snapshot) => {
                for(let k in incidentMarkers) incidentMarkers[k].setMap(null);
                incidentMarkers = {};

                const data = snapshot.val();
                if(data) {
                    const now = Date.now();
                    for(let key in data) {
                        const inc = data[key];
                        if (now - inc.timestamp_ms > 7200000) continue; 

                        if (inc.timestamp_ms > appStartTime && !announcedIncidents.has(key)) {
                            announcedIncidents.add(key);
                            speakText("전방에, 새로운 돌발 상황이 제보되었습니다.");
                        }

                        const pos = new kakao.maps.LatLng(inc.lat, inc.lon);
                        const content = `<div class="incident-marker">⚠️ 돌발상황<br><span style="font-size:10px;">${inc.time}</span></div>`;
                        const overlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1 });
                        overlay.setMap(map);
                        incidentMarkers[key] = overlay;
                    }
                }
            });
        }

        function startTrackingBus(busKey, route, vehicle) {
            if (busKey === myBusId) { alert("내 차를 추적할 수는 없습니다!"); return; }
            trackingBusId = busKey;
            lastTrackedStatus = ""; 
            tooCloseWarned = false;
            document.getElementById('trackAlert').style.display = 'block';
            speakText(`${route}번 버스 추적을 시작합니다.`);
        }

        function cancelTracking() {
            trackingBusId = null;
            document.getElementById('trackAlert').style.display = 'none';
        }

        function stopApp() {
            if (confirm("운행을 종료하고 앱을 닫으시겠습니까?")) {
                if (myBusId) database.ref('live_buses/' + myBusId).remove();
                window.location.reload(); 
            }
        }
    </script>
</body>
</html>
