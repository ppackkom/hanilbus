<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1c">
    
    <title>한일운수 실시간 도로상황</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 기본 배경 및 글꼴 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1c; color: #ffffff; margin: 0; padding: 0; }
        .container { padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 20px; }
        
        /* 노선 선택 버튼들 (가로 스크롤) */
        .route-scroll { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
        .route-btn { background-color: #333; color: #ccc; border: 1px solid #444; padding: 10px 15px; border-radius: 20px; white-space: nowrap; font-size: 14px; cursor: pointer; }
        .route-btn.active { background-color: #ff7f50; color: white; border: none; font-weight: bold; }

        /* 결과창 및 버스 상태 카드 디자인 */
        #resultArea { margin-top: 20px; }
        .bus-card { background-color: #2c2c2e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #ff7f50; }
        .bus-route { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #ff7f50; }
        .bus-status { font-size: 16px; margin-bottom: 5px; }
        .bus-speed { font-size: 14px; color: #ccc; }
        
        /* 상태별 색상 포인트 */
        .status-jam { border-left-color: #ff4d4d; } /* 정체 시 빨간색 */
        .status-good { border-left-color: #00cc44; } /* 원활 시 초록색 */
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>🚌 한일운수 실시간 도로상황</h2>
        </div>

        <div class="route-scroll">
            <div class="route-btn active" onclick="filterRoute('all')">전체</div>
            <div class="route-btn" onclick="filterRoute('204')">204번</div>
            <div class="route-btn" onclick="filterRoute('609')">609번</div>
            <div class="route-btn" onclick="filterRoute('894')">894번</div>
            <div class="route-btn" onclick="filterRoute('937')">937번</div>
            <div class="route-btn" onclick="filterRoute('dalseo6')">달서6번</div>
        </div>

        <div id="resultArea">
            <div style="text-align: center; color: #888; padding: 20px;">
                서버에서 실시간 데이터를 불러오는 중입니다... 📡
            </div>
        </div>
    </div>

    <script>
        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCKXl4AYBlrotyF3VHv6Gr0GP-p1ii4Bww",
            authDomain: "hanilbus-760ae.firebaseapp.com",
            databaseURL: "https://hanilbus-760ae-default-rtdb.firebaseio.com/",
            projectId: "hanilbus-760ae",
            storageBucket: "hanilbus-760ae.firebasestorage.app",
            messagingSenderId: "454505545954",
            appId: "1:454505545954:web:a1951147f2b4b34d019ebb",
            measurementId: "G-160EWPVGM5"
        };

        // 파이어베이스 초기화
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        const resultArea = document.getElementById('resultArea');

        // 서버에서 실시간으로 데이터 받아오기
        database.ref('test_busStatus').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                resultArea.innerHTML = ''; // "불러오는 중" 메시지 지우기
                
                for (const routeName in data) {
                    const busData = data[routeName];
                    
                    let cardClass = "";
                    if (busData.status.includes("정체")) cardClass += " status-jam";
                    else if (busData.status.includes("정상")) cardClass += " status-good";

                    // 영어가 그대로 나오던 오류(\)를 완전히 해결한 부분입니다!
                    const cardHTML = `
                        <div class="bus-card ${cardClass}">
                            <div class="bus-route">🚍 ${routeName}번 버스 정보</div>
                            <div class="bus-status"><b>현재 상태:</b> ${busData.status}</div>
                            <div class="bus-speed"><b>속도:</b> ${busData.speed} km/h (업데이트: ${busData.timestamp})</div>
                        </div>
                    `;
                    resultArea.innerHTML += cardHTML;
                }
            } else {
                resultArea.innerHTML = '<div style="color:#888;">현재 수집된 데이터가 없습니다. 송신기를 켜주세요.</div>';
            }
        });

        // 상단 노선 버튼 클릭 시 색상 변경 효과
        function filterRoute(routeId) {
            const buttons = document.querySelectorAll('.route-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
