<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>🚌 한일운수 스마트 상황판</h2>
            <div class="input-group">
                <label>📍 노선 선택</label>
                <select id="routeInput">
                    <option value="609" selected>609번</option>
                    <option value="204">204번</option>
                    <option value="894">894번</option>
                    <option value="937">937번</option>
                    <option value="dalseo6">달서6번</option>
                </select>
            </div>
            <div class="input-group">
                <label>🚍 차량 번호 (또는 순번)</label>
                <input type="text" id="vehicleInput" placeholder="예: 1988 또는 3호차">
            </div>
            <button class="start-btn" onclick="startApp()">🚀 운행 시작 (음성 안내)</button>
            <button id="installBtn" class="install-btn" onclick="installApp()">📲 스마트폰 바탕화면에 설치</button>
        </div>
    </div>

    <div id="mapScreen">
        <div class="header-overlay">
            <div class="header-top">
                <h2 id="myRouteInfo" onclick="handleAdminClick()">🗺️ 실시간 노선도</h2>
                <span class="user-count" id="userCount">👥 1명</span>
            </div>
            <div class="header-bottom">
                <div class="status-text"><span id="topStatus">GPS 연결 중... 📡</span></div>
                <div class="btn-group">
                    <button class="stop-btn fullscreen-btn" onclick="toggleFullScreen()">🔲 화면확대</button>
                    <button id="toggleRouteBtn" class="stop-btn toggle-btn" onclick="toggleRouteView()">🗺️ 전체 노선</button>
                    <button class="stop-btn" onclick="stopApp()">종료</button>
                </div>
            </div>
        </div>
        
        <div class="marquee-wrapper">
            <div class="marquee-text" id="mainMarqueeText">🚌 동료들과 함께 오늘도 안전운행! 식사 든든하게 챙겨 드시고, 무사고 화이팅입니다! 🚍</div>
        </div>

        <div id="trackAlert" onclick="cancelTracking()">
            <div id="trackTitle" style="font-size: 12px; color: white;">👀 앞차 추적 중</div>
            <div id="trackDist" class="dist-text">계산 중...</div>
            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">터치하여 해제</div>
        </div>
        
        <div id="map"></div>
        
        <div id="myLocationBtn" onclick="resumeTrackingMe()">🎯</div>

        <div class="bottom-bar">
            <select id="myManualStatus" class="status-select" onchange="updateManualStatus()">
                <option value="운행 중" selected>🟢 운행 중</option>
                <option value="가스 충전">⛽ 가스 충전</option>
                <option value="식사/휴식">🍚 식사/휴식</option>
                <option value="차량 고장">🔧 차량 고장</option> 
            </select>
            <button class="report-btn" onclick="openIncidentModal()">🚨 돌발상황 제보</button>
        </div>
    </div>

    <div id="incidentModal" class="modal-overlay">
        <div class="modal-content">
            <h3>🚨 상황을 선택해주세요</h3>
            <button class="modal-btn" style="background:#ff9900;" onclick="submitIncident('정체')">🚗 정체</button>
            <button class="modal-btn" style="background:#ff4d4d;" onclick="submitIncident('공사중')">🚧 공사중</button>
            <button class="modal-btn" style="background:#cc0000;" onclick="submitIncident('사고')">💥 사고</button>
            <button class="stop-btn" style="width:100%; padding:20px; margin-top:5px; font-size:20px; font-weight:900; border-radius:12px;" onclick="closeIncidentModal()">취소</button>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <h3 style="color:#00cc44;">👑 최고 관리자 모드</h3>
            
            <div class="admin-section">
                <h4>📝 전광판 문구 실시간 변경</h4>
                <input type="text" id="adminMarqueeInput" class="admin-input" placeholder="새로운 전광판 문구 입력">
                <button class="admin-small-btn" onclick="saveMarqueeText()">전광판 띄우기 🚀</button>
            </div>

            <div class="admin-section">
                <h4>📋 오늘 접속 차량 명단 (출근부)</h4>
                <div id="dailyLogList" class="log-list">기록을 불러오는 중...</div>
            </div>

            <div class="admin-section">
                <h4>🧹 서버 관리</h4>
                <button class="admin-small-btn" style="background:#cc0000;" onclick="cleanUpGhostBuses()">유령 버스(에러 데이터) 삭제</button>
            </div>

            <button class="stop-btn" style="width:100%; padding:15px; font-size:18px; border-radius:12px;" onclick="closeAdminModal()">닫기</button>
        </div>
    </div>

        function speakText(text, repeat = 2) {
            if (!window.speechSynthesis) return;
            const synth = window.speechSynthesis;
            let koVoice = synth.getVoices().find(v => v.lang.includes('ko') && (v.name.includes('Female') || v.name.includes('Yuna') || v.name.includes('Google')));
            if (!koVoice) koVoice = synth.getVoices().find(v => v.lang.includes('ko'));

            for (let i = 0; i < repeat; i++) {
                let utterance = new SpeechSynthesisUtterance(text);
                if (koVoice) utterance.voice = koVoice;
                utterance.lang = 'ko-KR'; 
                utterance.rate = 0.9; 
                utterance.pitch = 1.0; 
                synth.speak(utterance);
            }
        }
        
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function getInternalLocation(routeStr, lat, lon) {
            let stops = ROUTE_STOPS[routeStr];
            if (!stops) return null; 

            let bestDist = Infinity, bestStop = null, bestIdx = -1;
            
            for (let i = 0; i < stops.length; i++) {
                let d = getDistance(lat, lon, stops[i].lat, stops[i].lon);
                if (d < bestDist) { bestDist = d; bestStop = stops[i]; bestIdx = i; }
            }

            if (!bestStop) return null;

            if (bestDist <= 150) return bestStop.name + ' 앞';
            if (bestDist <= 500) return bestStop.name + ' 부근';
            
            if (bestDist <= 1200) {
                let secondDist = Infinity, secondIdx = -1;
                for (let i = 0; i < stops.length; i++) {
                    if (i === bestIdx) continue;
                    let d2 = getDistance(lat, lon, stops[i].lat, stops[i].lon);
                    if (d2 < secondDist) { secondDist = d2; secondIdx = i; }
                }
                
                if (secondIdx >= 0 && secondDist <= 1500) {
                    let i1 = bestIdx < secondIdx ? bestIdx : secondIdx;
                    let i2 = bestIdx < secondIdx ? secondIdx : bestIdx;
                    return stops[i1].name + ' ~ ' + stops[i2].name + ' 구간';
                }
                return bestStop.name + ' 방향';
            }
            return null;
        }

        function submitIncident(incidentType) {
            if (currentLat === 0) return;
            
            let internalLoc = getInternalLocation(myRoute, currentLat, currentLon);

            if (internalLoc) {
                finalizeIncident(incidentType, internalLoc);
            } else {
                geocoder.coord2RegionCode(currentLon, currentLat, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        finalizeIncident(incidentType, result[0].region_3depth_name + " 부근");
                    } else {
                        finalizeIncident(incidentType, "현재 위치"); 
                    }
                });
            }
        }

        function finalizeIncident(incidentType, locationText) {
            let finalMessage = incidentType + " (" + locationText + ")";
            
            database.ref('live_incidents').push({ 
                route: myRoute, 
                lat: currentLat, 
                lon: currentLon, 
                time: new Date().toLocaleTimeString(), 
                timestamp_ms: Date.now(),
                type: finalMessage 
            });
            
            closeIncidentModal(); 
            speakText(locationText + ", " + incidentType + " 제보가 완료되었습니다.", 1); 
        }

        // 💡 오타를 완벽하게 제거한 진짜 정상 작동 GPS 함수!
        function startGPS() {
            if (!("geolocation" in navigator)) {
                document.getElementById('topStatus').innerText = "GPS 미지원 기기 ❌";
                return;
            }
            
            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    currentLat = position.coords.latitude; currentLon = position.coords.longitude; currentSpeed = Math.round((position.coords.speed || 0) * 3.6);
                    
                    if (manualStatus === "운행 중") {
                        totalSpeed += currentSpeed;
                        speedCount++;
                        avgSpeed = Math.round(totalSpeed / speedCount);
                    }

                    if (currentSpeed > 15) {
                        slowStartTime = 0; 
                        currentTrafficState = "good"; 
                    } else {
                        if (slowStartTime === 0) slowStartTime = Date.now(); 
                        
                        if (Date.now() - slowStartTime > 40000) {
                            currentTrafficState = "jam"; 
                        } else {
                            currentTrafficState = "slow"; 
                        }
                    }

                    if (manualStatus === "운행 중") {
                        if (currentTrafficState === "good") currentStatusText = "정상 주행";
                        else if (currentTrafficState === "slow") currentStatusText = "서행/정차";
                        else currentStatusText = "정체 (40초+)";
                    } else {
                        currentStatusText = manualStatus; 
                    }

                    document.getElementById('topStatus').innerText = `속도:${currentSpeed}km/h(평균:${avgSpeed})`;
                    
                    if (isTrackingMe && trackingBusId === null) {
                        map.setCenter(new kakao.maps.LatLng(currentLat, currentLon));
                    }
                }, 
                function(error) {
                    let statusText = "GPS 오류 📡";
                    if (error.code === 1) {
                        statusText = "GPS 권한 거부됨 🚨 (설정 확인)";
                        if (!gpsAlerted) {
                            alert("⚠️ [위치 권한이 차단되어 있습니다]\n\n앱을 사용하시려면 위치 권한이 꼭 필요합니다.\n\n▶ 아이폰: [설정] ➔ [Safari] ➔ [위치] ➔ '허용'으로 변경\n▶ 안드로이드: 화면 맨 위를 쓸어내려 [위치(GPS)] 켜기\n\n설정 변경 후 인터넷 창을 새로고침 해주세요!");
                            gpsAlerted = true;
                        }
                    } else if (error.code === 2) {
                        statusText = "GPS 신호 없음 ☁️ (야외로 이동)";
                    } else if (error.code === 3) {
                        statusText = "GPS 연결 지연 ⏳";
                    }
                    document.getElementById('topStatus').innerText = statusText;
                }, 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 } 
            );
        }

        function sendMyLocation() {
            if (currentLat === 0) return;
            let now = Date.now();

            if (currentSpeed <= 3 && manualStatus === "운행 중") { if (!stopStartTime) stopStartTime = now; } 
            else { stopStartTime = null; }

            database.ref('live_buses/' + myBusId).set({
                route: myRoute, vehicle: myVehicle, status: currentStatusText, speed: currentSpeed, lat: currentLat, lon: currentLon, 
                timestamp: new Date().toLocaleTimeString(), last_update_ms: now, stopStartTime: stopStartTime 
            });

            if (now - lastTailTime > 15000) {
                database.ref('live_tails/' + myBusId).push({ lat: currentLat, lon: currentLon, speed: currentSpeed, state: currentTrafficState, time: now });
                lastTailTime = now;
                let cutoff = now - 1800000;
                database.ref('live_tails/' + myBusId).orderByChild('time').endAt(cutoff).once('value', snapshot => { snapshot.forEach(child => { child.ref.remove(); }); });
            }
        }

        function startReceivingData() {
            database.ref('live_buses').on('value', (snapshot) => { lastFirebaseData = snapshot.val(); renderBuses(lastFirebaseData); });
        }

        function renderBuses(data) {
            let nowMs = Date.now();

            for (const key in busMarkers) { if (!data || !data[key]) { busMarkers[key].setMap(null); delete busMarkers[key]; } }
            if (!data) return;

            for (const key in data) {
                const bus = data[key];
                if (!bus.last_update_ms || (nowMs - bus.last_update_ms > 600000)) { if (busMarkers[key]) { busMarkers[key].setMap(null); delete busMarkers[key]; } continue; }
                if (!showAllRoutes && bus.route !== myRoute && key !== myBusId) { if (busMarkers[key]) { busMarkers[key].setMap(null); } continue; }

                if (bus.lat && bus.lon) {
                    const pos = new kakao.maps.LatLng(bus.lat, bus.lon);
                    let isMyBus = (key === myBusId) ? " my-bus" : "";
                    
                    let labelColor = "good"; 
                    if (bus.status.includes("정체 (40초+)")) labelColor = "jam"; 
                    else if (bus.status.includes("서행/정차")) labelColor = "slow"; 
                    
                    let displayStatus = `${bus.speed}km/h`; let stopTimerText = ""; 
                    
                    if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") { labelColor = "break"; displayStatus = bus.status; }
                    
                    if (bus.stopStartTime && bus.speed <= 3 && bus.status.includes("정체")) {
                        let diffSec = Math.floor((nowMs - bus.stopStartTime) / 1000);
                        if (diffSec >= 60) { let stopMins = Math.floor(diffSec / 60); stopTimerText = `<br><span style=\"color:#ffe6e6; font-size:11px;\">⏱️ ${stopMins}분째 정차중</span>`; labelColor = "jam"; }
                    }
                    
                    let contentHtml = document.createElement('div');
                    contentHtml.className = `bus-label ${labelColor}${isMyBus}`;
                    contentHtml.innerHTML = `🚍 ${bus.route}번 [${bus.vehicle}]<br><span style=\"font-size:11px; font-weight:normal;\">${displayStatus}</span>${stopTimerText}`;
                    contentHtml.onclick = () => { startTrackingBus(key, bus.route, bus.vehicle); };

                    if (busMarkers[key]) {
                        busMarkers[key].setMap(map); busMarkers[key].setPosition(pos); busMarkers[key].setContent(contentHtml);
                        if(isMyBus) busMarkers[key].setZIndex(20);
                    } else {
                        const overlay = new kakao.maps.CustomOverlay({ position: pos, content: contentHtml, yAnchor: 1.2 });
                        overlay.setMap(map); busMarkers[key] = overlay;
                        if(isMyBus) overlay.setZIndex(20);
                    }

                    if (trackingBusId === key && currentLat !== 0) {
                        const distInMeters = getDistance(currentLat, currentLon, bus.lat, bus.lon);
                        if (lastTrackedStatus !== bus.status) {
                            if (bus.status === "가스 충전" || bus.status === "식사/휴식" || bus.status === "차량 고장") { speakText(`앞차가, ${bus.status} 상태로 변경되었습니다.`); } 
                            else if (bus.status.includes("정체") && !lastTrackedStatus.includes("정체")) { geocoder.coord2RegionCode(bus.lon, bus.lat, function(result, status) { if (status === kakao.maps.services.Status.OK) { speakText(`앞차가, ${result[0].region_3depth_name} 부근에서 정체 중입니다.`); } }); }
                            lastTrackedStatus = bus.status;
                        }
                        if (distInMeters < 300) { if (!tooCloseWarned) { speakText("주의, 앞차와의 간격이 너무 가깝습니다."); tooCloseWarned = true; } } else if (distInMeters > 500) { tooCloseWarned = false; }
                        let distText = distInMeters >= 1000 ? (distInMeters / 1000).toFixed(1) + " km" : distInMeters + " m";
                        document.getElementById('trackTitle').innerText = `👀 ${bus.route}번 [${bus.vehicle}] 앞차 간격`; document.getElementById('trackDist').innerText = distText;
                        const bounds = new kakao.maps.LatLngBounds(); bounds.extend(new kakao.maps.LatLng(currentLat, currentLon)); bounds.extend(pos); map.setBounds(bounds, 50, 50, 50, 50); 
                    }
                }
            }
        }

        function loadTails() {
            database.ref('live_tails').on('value', (snapshot) => {
                tailPolylines.forEach(line => line.setMap(null)); tailPolylines = [];
                let data = snapshot.val(); if (!data) return;
                let now = Date.now(); let cutoff = now - 1800000; 

                for (let busId in data) {
                    let busRoute = busId.split('_')[0];
                    if (!showAllRoutes && busRoute !== myRoute && busId !== myBusId) continue;

                    let points = Object.values(data[busId]).filter(p => p.time > cutoff).sort((a,b) => a.time - b.time);
                    if (points.length < 2) continue;

                    for (let i = 1; i < points.length; i++) {
                        let p1 = points[i-1]; let p2 = points[i];
                        if (p2.time - p1.time > 300000) continue;
                        
                        let lineColor = '#00cc44'; 
                        if (p2.state === 'jam') lineColor = '#ff4d4d'; 
                        else if (p2.state === 'slow') lineColor = '#ff9900'; 
                        else if (!p2.state && p2.speed <= 15) lineColor = '#ff9900'; 

                        let polyline = new kakao.maps.Polyline({ path: [new kakao.maps.LatLng(p1.lat, p1.lon), new kakao.maps.LatLng(p2.lat, p2.lon)], strokeWeight: 6, strokeColor: lineColor, strokeOpacity: 0.7, strokeStyle: 'solid' });
                        polyline.setMap(map); tailPolylines.push(polyline);
                    }
                }
            });
        }

        function loadIncidents() {
            database.ref('live_incidents').on('value', (snapshot) => {
                for(let k in incidentMarkers) incidentMarkers[k].setMap(null); incidentMarkers = {};
                const data = snapshot.val(); if(data) {
                    const now = Date.now();
                    for(let key in data) {
                        const inc = data[key]; if (now - inc.timestamp_ms > 1800000) continue; 
                        if (!showAllRoutes && inc.route !== myRoute) continue;

                        if (inc.timestamp_ms > appStartTime && !announcedIncidents.has(key)) { 
                            announcedIncidents.add(key); 
                            speakText("전방에, " + inc.type + " 제보가 있습니다."); 
                        }

                        const pos = new kakao.maps.LatLng(inc.lat, inc.lon); 
                        const displayType = inc.type || "⚠️ 돌발상황"; 
                        const content = `<div class=\"incident-marker\">🚨 ${displayType}<br><span style=\"font-size:10px;\">${inc.time}</span></div>`;
                        const overlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1, zIndex: 15 });
                        overlay.setMap(map); incidentMarkers[key] = overlay;
                    }
                }
            });
        }

        function startTrackingBus(busKey, route, vehicle) { 
            if (busKey === myBusId) { alert("내 차를 추적할 수는 없습니다!"); return; } 
            trackingBusId = busKey; 
            isTrackingMe = false; 
            document.getElementById('myLocationBtn').style.display = 'block'; 
            
            lastTrackedStatus = ""; tooCloseWarned = false; 
            document.getElementById('trackAlert').style.display = 'block'; 
            speakText(`${route}번 버스 추적을 시작합니다.`); 
        }
        
        function cancelTracking() { 
            trackingBusId = null; 
            document.getElementById('trackAlert').style.display = 'none'; 
        }
        
        function stopApp() {
            if (confirm("운행을 종료하고 앱을 닫으시겠습니까?")) {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                if (myBusId) { database.ref('live_buses/' + myBusId).remove(); database.ref('live_tails/' + myBusId).remove(); }
                if (myConnectionKey) liveConnectionsRef.child(myConnectionKey).remove();
                window.location.reload(); 
            }
        }
    </script>
</body>
