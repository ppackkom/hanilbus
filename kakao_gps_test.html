<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오 GPS 테스트</title>
<style>
  body{background:#0d1117;color:#e6edf3;font-family:'Noto Sans KR',sans-serif;padding:20px;max-width:480px;margin:0 auto;}
  h2{color:#f97316;margin-bottom:20px;text-align:center;}
  .card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:16px;margin-bottom:14px;}
  .label{font-size:11px;color:#8b949e;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
  .value{font-size:15px;font-weight:700;color:#e6edf3;min-height:22px;}
  .value.green{color:#22c55e;}
  .value.orange{color:#f97316;}
  .value.red{color:#ef4444;}
  .value.blue{color:#3b82f6;}
  .value.yellow{color:#eab308;}
  button{width:100%;padding:16px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-gps{background:#f97316;color:white;}
  .btn-voice{background:#22c55e;color:white;}
  .btn-stop{background:#ef4444;color:white;}
  .btn-clear{background:#21262d;color:#8b949e;border:1px solid #30363d;}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  .log{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px;max-height:220px;overflow-y:auto;font-size:12px;color:#8b949e;font-family:monospace;}
  .log-item{padding:3px 0;border-bottom:1px solid #21262d;}
  .log-item.ok{color:#22c55e;}
  .log-item.err{color:#ef4444;}
  .log-item.info{color:#3b82f6;}
  .log-item.warn{color:#eab308;}
  .key-input{width:100%;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 12px;color:#e6edf3;font-size:14px;outline:none;box-sizing:border-box;margin-top:6px;}
  .key-input:focus{border-color:#f97316;}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;}
  .dot-ok{background:#22c55e;}
  .dot-err{background:#ef4444;}
  .dot-wait{background:#8b949e;}
  .dot-warn{background:#eab308;}
  /* 최종 결과 큰 박스 */
  .result-box{padding:14px 16px;border-radius:12px;margin-top:10px;text-align:center;}
  .result-box.stop{background:rgba(34,197,94,0.12);border:1.5px solid rgba(34,197,94,0.3);}
  .result-box.section{background:rgba(249,115,22,0.12);border:1.5px solid rgba(249,115,22,0.3);}
  .result-box.addr{background:rgba(59,130,246,0.12);border:1.5px solid rgba(59,130,246,0.3);}
  .result-box.none{background:rgba(139,148,158,0.1);border:1.5px solid #30363d;}
  .result-label{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
  .result-label.stop{color:#22c55e;}
  .result-label.section{color:#f97316;}
  .result-label.addr{color:#3b82f6;}
  .result-label.none{color:#8b949e;}
  .result-text{font-size:20px;font-weight:900;}
  .result-text.stop{color:#22c55e;}
  .result-text.section{color:#f97316;}
  .result-text.addr{color:#3b82f6;}
  .result-text.none{color:#8b949e;}
  .source-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px;}
  .badge-kakao{background:rgba(255,230,0,0.15);color:#eab308;border:1px solid rgba(255,230,0,0.3);}
  .badge-internal{background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.3);}
  .badge-addr{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3);}
  .route-select{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .route-chip{padding:6px 14px;border-radius:20px;border:1.5px solid #30363d;background:#21262d;color:#8b949e;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
  .route-chip.selected{background:#f97316;border-color:#f97316;color:white;}
</style>
</head>
<body>

<h2>🚌 카카오 GPS 정류장 테스트</h2>

<!-- API 키 -->
<div class="card">
  <div class="label">카카오 REST API 키</div>
  <input class="key-input" id="apiKey" type="text" placeholder="REST API 키 입력" oninput="saveKey()">
  <div style="font-size:11px;color:#8b949e;margin-top:5px;">💡 developers.kakao.com → 내 애플리케이션 → REST API 키</div>
</div>

<!-- 노선 선택 -->
<div class="card">
  <div class="label">노선 선택 (선택 시 더 정확한 정류장 매칭)</div>
  <div class="route-select">
    <button class="route-chip" onclick="selectRoute(this,'')">전체</button>
    <button class="route-chip" onclick="selectRoute(this,'204')">204번</button>
    <button class="route-chip" onclick="selectRoute(this,'609')">609번</button>
    <button class="route-chip" onclick="selectRoute(this,'894')">894번</button>
    <button class="route-chip" onclick="selectRoute(this,'937')">937번</button>
    <button class="route-chip" onclick="selectRoute(this,'달서6')">달서6번</button>
  </div>
</div>

<!-- GPS 좌표 -->
<div class="card">
  <div class="label">📍 GPS 좌표</div>
  <div class="value blue" id="coords">버튼을 눌러 시작하세요</div>
</div>

<!-- 결과 비교 -->
<div class="card">
  <div class="label">🔍 결과 비교</div>

  <div style="margin-bottom:10px;">
    <div style="font-size:11px;color:#eab308;font-weight:700;margin-bottom:4px;">🟡 카카오 API 정류장 검색</div>
    <div class="value yellow" id="kakaoResult">-</div>
  </div>

  <div style="margin-bottom:10px;">
    <div style="font-size:11px;color:#a855f7;font-weight:700;margin-bottom:4px;">🟣 내장 정류장 데이터 (구간 표시)</div>
    <div class="value" id="internalResult">-</div>
  </div>

  <div>
    <div style="font-size:11px;color:#3b82f6;font-weight:700;margin-bottom:4px;">🔵 카카오 주소 변환</div>
    <div class="value blue" id="addrResult">-</div>
  </div>

  <!-- 최종 채택 결과 -->
  <div class="result-box none" id="finalBox" style="margin-top:12px;">
    <div class="result-label none" id="finalLabel">최종 결과</div>
    <div class="result-text none" id="finalText">-</div>
    <div id="sourceBadge"></div>
  </div>
</div>

<!-- API 상태 -->
<div class="card">
  <div class="label">⚙️ API 상태</div>
  <div style="display:flex;flex-direction:column;gap:5px;">
    <div><span class="status-dot dot-wait" id="dot1"></span><span id="st1" style="font-size:12px;">카카오 정류장 검색 — 대기</span></div>
    <div><span class="status-dot dot-wait" id="dot2"></span><span id="st2" style="font-size:12px;">내장 데이터 매칭 — 대기</span></div>
    <div><span class="status-dot dot-wait" id="dot3"></span><span id="st3" style="font-size:12px;">카카오 주소 변환 — 대기</span></div>
    <div><span class="status-dot dot-wait" id="dot4"></span><span id="st4" style="font-size:12px;">GPS — 대기</span></div>
  </div>
</div>

<button class="btn-gps" id="btnGps" onclick="runTest()">📍 GPS 위치 가져오기</button>
<button class="btn-voice" id="btnVoice" onclick="speakResult()" disabled>🔊 최종 결과 음성으로 읽기</button>
<button class="btn-stop" onclick="if(window.speechSynthesis)window.speechSynthesis.cancel();">⏹️ 음성 중지</button>
<button class="btn-clear" onclick="document.getElementById('log').innerHTML='';">🗑️ 로그 지우기</button>

<!-- 로그 -->
<div class="card">
  <div class="label">📋 로그</div>
  <div class="log" id="log"></div>
</div>

  var saved=localStorage.getItem('kakao_test_key');
  if(saved) document.getElementById('apiKey').value=saved;
}catch(e){}

function saveKey(){try{localStorage.setItem('kakao_test_key',document.getElementById('apiKey').value);}catch(e){}}

function selectRoute(btn,route){
  selectedRoute=route;
  var chips=document.querySelectorAll('.route-chip');
  for(var i=0;i<chips.length;i++) chips[i].classList.remove('selected');
  btn.classList.add('selected');
  log('노선 선택: '+(route||'전체'),'info');
}

// ── 로그 ────────────────────────────────────
function log(msg,type){
  type=type||'info';
  var logDiv=document.getElementById('log');
  var item=document.createElement('div');
  item.className='log-item '+type;
  var t=new Date().toLocaleTimeString('ko-KR');
  item.textContent='['+t+'] '+msg;
  logDiv.appendChild(item);
  logDiv.scrollTop=logDiv.scrollHeight;
}

function setSt(n,ok,msg){
  var dot=document.getElementById('dot'+n);
  var st=document.getElementById('st'+n);
  dot.className='status-dot '+(ok===true?'dot-ok':ok===false?'dot-err':ok==='warn'?'dot-warn':'dot-wait');
  st.textContent=msg;
}

// ── 거리 계산 ────────────────────────────────
function calcDist(lat1,lon1,lat2,lon2){
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── ★ 내장 데이터로 정류장/구간 찾기 ──────────
function findInternal(route, lat, lon){
  var routesToSearch=route?[route]:Object.keys(ROUTE_STOPS);
  var bestDist=Infinity, bestStop=null, bestRoute=null, bestIdx=-1;

  for(var r=0;r<routesToSearch.length;r++){
    var rkey=routesToSearch[r];
    var stops=ROUTE_STOPS[rkey];
    if(!stops) continue;
    for(var i=0;i<stops.length;i++){
      var d=calcDist(lat,lon,stops[i].lat,stops[i].lon);
      if(d<bestDist){bestDist=d;bestStop=stops[i];bestRoute=rkey;bestIdx=i;}
    }
  }
  if(!bestStop) return null;

  // 150m 이내 — 정류장 바로 앞
  if(bestDist<=150){
    return {text:bestStop.name+' 앞', type:'stop', dist:Math.round(bestDist), route:bestRoute};
  }
  // 500m 이내 — 정류장 부근
  if(bestDist<=500){
    return {text:bestStop.name+' 부근', type:'stop', dist:Math.round(bestDist), route:bestRoute};
  }
  // 500m~1.2km — 두 정류장 사이 구간
  if(bestDist<=1200){
    var stops2=ROUTE_STOPS[bestRoute];
    // 두 번째로 가까운 정류장 찾기
    var secondDist=Infinity, secondIdx=-1;
    for(var i=0;i<stops2.length;i++){
      if(i===bestIdx) continue;
      var d2=calcDist(lat,lon,stops2[i].lat,stops2[i].lon);
      if(d2<secondDist){secondDist=d2;secondIdx=i;}
    }
    if(secondIdx>=0&&secondDist<=1500){
      var i1=bestIdx<secondIdx?bestIdx:secondIdx;
      var i2=bestIdx<secondIdx?secondIdx:bestIdx;
      var section=stops2[i1].name+' ~ '+stops2[i2].name+' 구간';
      return {text:section, type:'section', dist:Math.round(bestDist), route:bestRoute};
    }
    return {text:bestStop.name+' 방향', type:'stop', dist:Math.round(bestDist), route:bestRoute};
  }
  return null;
}

// ── 카카오 정류장 검색 ───────────────────────
function kakaoStop(key,lat,lon,route,cb){
  var url='https://dapi.kakao.com/v2/local/search/category.json'+
    '?category_group_code=SW8&x='+lon+'&y='+lat+'&radius=300&sort=distance&size=5';
  fetch(url,{headers:{'Authorization':'KakaoAK '+key}})
  .then(function(r){
    if(r.status===401){log('카카오 키 오류(401) — 키 확인 및 도메인 등록 필요','err');cb(null);return Promise.reject();}
    if(!r.ok){log('카카오 API 오류: HTTP '+r.status,'err');cb(null);return Promise.reject();}
    return r.json();
  })
  .then(function(data){
    var docs=data.documents;
    if(!docs||docs.length===0){log('카카오: 300m 내 버스정류장 없음','warn');cb(null);return;}

    // 전체 결과 로그
    for(var i=0;i<docs.length;i++){
      log('  카카오 '+(i+1)+'. '+docs[i].place_name+' ('+docs[i].distance+'m)','info');
    }

    // 노선 정류장과 교차검증
    if(route&&ROUTE_STOPS[route]){
      var stops=ROUTE_STOPS[route];
      for(var i=0;i<docs.length;i++){
        var kname=docs[i].place_name.replace(/버스정류장|정류장|버스승강장|승강장/g,'').trim();
        for(var j=0;j<stops.length;j++){
          if(stops[j].name.indexOf(kname)>=0||kname.indexOf(stops[j].name)>=0){
            var dist=parseInt(docs[i].distance||0);
            var label=dist<=80?stops[j].name+' 앞':dist<=200?stops[j].name+' 부근':stops[j].name+' 방향';
            log('카카오+내장 교차검증 성공: '+label,'ok');
            cb({text:label,raw:docs[i]});return;
          }
        }
      }
    }

    // 교차검증 실패 — 가장 가까운 것
    var s=docs[0];
    var dist=parseInt(s.distance||0);
    var name=s.place_name.replace(/버스정류장|정류장|버스승강장|승강장/g,'').trim();
    var label=dist<=80?name+' 앞':dist<=200?name+' 부근':name+' 방향';
    cb({text:label,raw:s});
  })
  .catch(function(){cb(null);});
}

// ── 카카오 주소 변환 ─────────────────────────
function kakaoAddr(key,lat,lon,cb){
  var url='https://dapi.kakao.com/v2/local/geo/coord2address.json?x='+lon+'&y='+lat;
  fetch(url,{headers:{'Authorization':'KakaoAK '+key}})
  .then(function(r){if(!r.ok){cb(null);return Promise.reject();}return r.json();})
  .then(function(data){
    var docs=data.documents;
    if(!docs||docs.length===0){cb(null);return;}
    var a=docs[0];
    if(a.road_address&&a.road_address.road_name) cb(a.road_address.road_name+' 부근');
    else if(a.address) cb(a.address.region_3depth_name+' 부근');
    else cb(null);
  })
  .catch(function(){cb(null);});
}

// ── 최종 결과 표시 ───────────────────────────
function showFinal(text, type, source){
  var box=document.getElementById('finalBox');
  var label=document.getElementById('finalLabel');
  var textEl=document.getElementById('finalText');
  var badge=document.getElementById('sourceBadge');
  box.className='result-box '+type;
  var labelMap={stop:'🚏 정류장 매칭',section:'📍 구간 매칭',addr:'🏠 주소 변환',none:'결과 없음'};
  label.className='result-label '+type;
  label.textContent=labelMap[type]||'결과';
  textEl.className='result-text '+type;
  textEl.textContent=text;
  var badgeMap={kakao:'badge-kakao',internal:'badge-internal',addr:'badge-addr'};
  var badgeText={kakao:'카카오 DB',internal:'내장 데이터',addr:'카카오 주소'};
  if(source){
    badge.innerHTML='<span class="source-badge '+badgeMap[source]+'">'+badgeText[source]+'</span>';
  }
  document.getElementById('btnVoice').disabled=false;
}

// ── 메인 테스트 ──────────────────────────────
function runTest(){
  var key=document.getElementById('apiKey').value.trim();
  if(!key){alert('REST API 키를 입력해 주세요!');return;}

  var btn=document.getElementById('btnGps');
  btn.disabled=true;btn.innerHTML='⏳ 위치 가져오는 중...';

  // 초기화
  ['kakaoResult','internalResult','addrResult'].forEach(function(id){
    document.getElementById(id).textContent='-';
    document.getElementById(id).className='value';
  });
  document.getElementById('finalText').textContent='-';
  document.getElementById('finalBox').className='result-box none';
  document.getElementById('sourceBadge').innerHTML='';
  document.getElementById('btnVoice').disabled=true;
  setSt(1,null,'카카오 정류장 검색 — 대기');
  setSt(2,null,'내장 데이터 매칭 — 대기');
  setSt(3,null,'카카오 주소 변환 — 대기');
  setSt(4,null,'GPS — 수신 중...');
  log('═══ 테스트 시작 (노선: '+(selectedRoute||'전체')+') ═══','info');

  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude, lon=pos.coords.longitude;
    var acc=Math.round(pos.coords.accuracy);
    document.getElementById('coords').textContent='위도 '+lat.toFixed(6)+'  경도 '+lon.toFixed(6)+'  (±'+acc+'m)';
    setSt(4,true,'GPS — 완료 (±'+acc+'m)');
    log('GPS: '+lat.toFixed(5)+', '+lon.toFixed(5)+' ±'+acc+'m','ok');
    btn.innerHTML='⏳ API 검색 중...';

    var kakaoResult=undefined, internalResult=undefined, addrResult=undefined;

    function tryFinalize(){
      if(kakaoResult===undefined||internalResult===undefined||addrResult===undefined) return;

      // ★ 우선순위 결정
      // 1순위: 카카오 정류장 (교차검증 성공)
      // 2순위: 내장 데이터 (구간 표시 포함)
      // 3순위: 카카오 주소 변환
      if(kakaoResult){
        showFinal(kakaoResult,'stop','kakao');
        log('✅ 최종: 카카오 정류장 → '+kakaoResult,'ok');
      } else if(internalResult){
        var type=internalResult.type==='section'?'section':'stop';
        showFinal(internalResult.text,type,'internal');
        log('✅ 최종: 내장 데이터 → '+internalResult.text,'ok');
      } else if(addrResult){
        showFinal(addrResult,'addr','addr');
        log('✅ 최종: 주소 변환 → '+addrResult,'ok');
      } else {
        showFinal('위치를 확인할 수 없어요','none','');
        log('❌ 최종: 모든 방법 실패','err');
      }
      btn.disabled=false;btn.innerHTML='📍 GPS 위치 가져오기';
    }

    // ① 카카오 정류장 검색
    setSt(1,null,'카카오 정류장 검색 중...');
    kakaoStop(key,lat,lon,selectedRoute,function(result){
      if(result){
        kakaoResult=result.text;
        document.getElementById('kakaoResult').className='value yellow';
        document.getElementById('kakaoResult').textContent=result.text+(result.raw?' ('+result.raw.distance+'m)':'');
        setSt(1,true,'카카오 정류장 — 성공: '+result.text);
      } else {
        kakaoResult=null;
        document.getElementById('kakaoResult').className='value red';
        document.getElementById('kakaoResult').textContent='정류장 없음 (300m 초과)';
        setSt(1,'warn','카카오 정류장 — 결과 없음');
      }
      tryFinalize();
    });

    // ② 내장 데이터 매칭 (즉시)
    setSt(2,null,'내장 데이터 매칭 중...');
    var intResult=findInternal(selectedRoute,lat,lon);
    internalResult=intResult;
    if(intResult){
      var color=intResult.type==='section'?'orange':'green';
      document.getElementById('internalResult').className='value '+color;
      document.getElementById('internalResult').textContent=intResult.text+' ('+intResult.dist+'m, '+intResult.route+'번)';
      setSt(2,true,'내장 데이터 — 성공: '+intResult.text);
      log('내장: '+intResult.text+' ('+intResult.dist+'m)','ok');
    } else {
      document.getElementById('internalResult').className='value red';
      document.getElementById('internalResult').textContent='1.2km 내 정류장 없음';
      setSt(2,'warn','내장 데이터 — 범위 초과');
      log('내장: 1.2km 내 정류장 없음','warn');
    }
    tryFinalize();

    // ③ 카카오 주소 변환
    setSt(3,null,'카카오 주소 변환 중...');
    kakaoAddr(key,lat,lon,function(result){
      addrResult=result;
      if(result){
        document.getElementById('addrResult').className='value blue';
        document.getElementById('addrResult').textContent=result;
        setSt(3,true,'주소 변환 — 성공: '+result);
        log('주소: '+result,'ok');
      } else {
        document.getElementById('addrResult').className='value red';
        document.getElementById('addrResult').textContent='주소 변환 실패';
        setSt(3,false,'주소 변환 — 실패');
        log('주소 변환 실패','err');
      }
      tryFinalize();
    });

  },function(err){
    setSt(4,false,'GPS — 실패');
    btn.disabled=false;btn.innerHTML='📍 GPS 위치 가져오기';
    if(err.code===1){log('위치 권한 거부. 브라우저 설정에서 허용해 주세요.','err');alert('위치 권한을 허용해 주세요!');}
    else if(err.code===2){log('GPS 신호 없음. 실외에서 다시 시도해 주세요.','err');}
    else{log('GPS 시간 초과.','err');}
  },{timeout:15000,enableHighAccuracy:true,maximumAge:0});
}

// ── 음성 ────────────────────────────────────
function speakResult(){
  var text=document.getElementById('finalText').textContent;
  if(!text||text==='-'){return;}
  if(!window.speechSynthesis){alert('음성 미지원');return;}
  window.speechSynthesis.cancel();
  setTimeout(function(){
    var u=new SpeechSynthesisUtterance('현재 위치는 '+text+' 입니다.');
    u.lang='ko-KR';u.rate=0.92;u.volume=1.0;
    var voices=window.speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){if(voices[i].lang==='ko-KR'||voices[i].lang==='ko'){u.voice=voices[i];break;}}
    window.speechSynthesis.speak(u);
    log('음성: 현재 위치는 '+text+' 입니다.','ok');
  },150);
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

// 첫 번째 버튼 선택
document.querySelector('.route-chip').classList.add('selected');
</script>
