<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한일운수 스마트 배차판 (개인서버 완결판)</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #000000; color: white; }
        
        #loginScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .login-box { background-color: #222; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #00cc44; box-shadow: 0 10px 30px rgba(0,204,68,0.2); }
        .login-box h2 { color: #00cc44; margin-top: 0; margin-bottom: 30px; font-size: 26px; } 
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; margin-bottom: 10px; color: #eee; font-size: 18px; font-weight: bold; letter-spacing: 0.5px; } 
        .input-group select, .input-group input { width: 100%; padding: 18px; font-size: 20px; border-radius: 12px; border: 2px solid #444; background-color: #333; color: white; outline: none; box-sizing: border-box; font-weight: bold; } 
        .input-group input:focus, .input-group select:focus { border-color: #00cc44; background-color: #3a3a3c; }
        .start-btn { background: linear-gradient(135deg, #00cc44, #009933); color: white; border: none; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 14px; width: 100%; cursor: pointer; margin-top: 10px; } 
        .start-btn:active { transform: scale(0.97); }

        #mainScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; display: none; flex-direction: column; align-items: center; padding-top: 30px; box-sizing: border-box; overflow-y: auto; }
        
        .header-title { font-size: 28px; color: #00cc44; font-weight: bold; margin-bottom: 10px; }
        .update-time { font-size: 14px; color: #888; margin-bottom: 25px; }
        
        #headwayContainer { width: 95%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        .bus-card { background: #1a1a1c; padding: 20px; border-radius: 16px; text-align: left; border: 1px solid #333; }
        
        .bus-card.ahead { border-left: 8px solid #ff9900; }  
        .bus-card.mine { border-left: 8px solid #00cc44; background: #1a2a1a; border-color: #00cc44; }   
        .bus-card.behind { border-left: 8px solid #3b82f6; } 

        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .card-role { font-size: 18px; font-weight: bold; }
        .card-diff { font-size: 15px; color: #fff; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 12px; font-weight: bold; }
        
        .card-main { font-size: 24px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .card-sub { font-size: 16px; color: #aaa; }

        .loading-text { font-size: 18px; color: #aaa; text-align: center; margin-top: 30px; line-height: 1.6; font-weight: bold; word-break: keep-all; }
        .refresh-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: 2px solid #555; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .refresh-btn:active { transform: scale(0.9); }
        
        .debug-box { font-size: 12px; color: #888; background: #111; padding: 12px; border-radius: 8px; margin-top: 20px; text-align: left; word-break: break-all; border: 1px solid #333; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>🚌 스마트 배차판</h2>
            <div class="input-group">
                <label>📍 노선 선택</label>
                <select id="routeInput">
                    <option value="609" selected>609번</option>
                    <option value="204">204번</option>
                    <option value="894">894번</option>
                    <option value="937">937번</option>
                </select>
            </div>
            <div class="input-group">
                <label>🚍 내 차량 번호 (4자리)</label>
                <input type="text" id="vehicleInput" placeholder="예: 1988" maxlength="4">
            </div>
            <button class="start-btn" onclick="startApp()">배차 모니터링 시작 🚀</button>
        </div>
    </div>

    <div id="mainScreen">
        <div class="header-title" id="routeTitle">609번 배차 현황</div>
        <div class="update-time" id="lastUpdateTime">데이터 통신 준비 중...</div>
        
        <div id="headwayContainer">
            <div class="loading-text">
                📡 대장님의 구글 서버와 통신 중입니다...<br>
                <span style="font-size:14px; color:#666;">(데이터를 가져오는 데 2~3초 소요됩니다)</span>
            </div>
        </div>

        <button class="refresh-btn" onclick="fetchRouteIdAndBuses()">🔄</button>
    </div>

    <script>
        // 💡 대장님이 발급받으신 완벽한 API 키!
        const DAEGU_API_KEY = "fbe75f2e8a775701a90ce236bf7ddb5ba419136f8f1510a8a0b8989e45ecb5b0";
        
        // 💡 대장님이 직접 개설하신 무적의 구글 개인 서버 주소!
        const GOOGLE_PROXY = "https://script.google.com/macros/s/AKfycbxxfDqD1ck9hmUR86hhurfE7TyxdYUDRVwEwpqGvOQkU66amq3bSEpYMQt--_Ur8UJhoA/exec?url=";

        let myRoute = "";
        let myVehicle = "";
        let daeguRouteId = ""; 
        let refreshTimer = null;
        let isFetching = false; 

        // 오직 구글 서버만 믿고 갑니다!
        async function fetchWithGoogleProxy(targetUrl) {
            let fetchUrl = GOOGLE_PROXY + encodeURIComponent(targetUrl);
            
            try {
                let response = await fetch(fetchUrl);
                let text = await response.text();

                // 만약 구글 서버에서 에러를 보냈다면?
                if (text.includes("URL이 없습니다") || text.includes("Exception")) {
                    throw new Error("GOOGLE_SERVER_ERROR: " + text);
                }

                // 정상적으로 JSON 데이터가 왔는지 확인
                try {
                    let jsonData = JSON.parse(text);
                    return jsonData;
                } catch(e) {
                    // JSON이 아니라 XML(에러 메시지)이 왔을 경우
                    if (text.includes('<OpenAPI_ServiceResponse>')) {
                        if(text.includes('LIMITED_NUMBER_OF_SERVICE_REQUESTS_EXCEEDS_ERROR')) throw new Error("API_KEY_LIMIT");
                        if(text.includes('SERVICE_KEY_IS_NOT_REGISTERED_ERROR') || text.includes('INVALID_REQUEST_PARAMETER_ERROR')) throw new Error("API_KEY_UNREGISTERED");
                        throw new Error("API_XML_ERROR: " + text);
                    } else {
                        throw new Error("NOT_JSON: " + text);
                    }
                }
            } catch (e) {
                throw e; 
            }
        }

        function startApp() {
            myRoute = document.getElementById('routeInput').value;
            myVehicle = document.getElementById('vehicleInput').value.trim();
            
            if (myVehicle === "" || myVehicle.length < 4) { 
                alert("차량 번호 4자리를 정확히 입력해주세요! (예: 1988)"); 
                return; 
            }

            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); }

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('routeTitle').innerText = `${myRoute}번 배차 현황`;

            fetchRouteIdAndBuses();
            refreshTimer = setInterval(fetchRouteIdAndBuses, 20000); // 20초 갱신
        }

        async function fetchRouteIdAndBuses() {
            if(isFetching) return; 
            isFetching = true;
            document.getElementById('lastUpdateTime').innerText = "🔄 실시간 데이터 수신 중...";

            if (!daeguRouteId) {
                const routeInfoUrl = `https://apis.data.go.kr/1613000/BusRouteInfoInqireService/getRouteNoList?serviceKey=${DAEGU_API_KEY}&pageNo=1&numOfRows=10&_type=json&cityCode=22&routeNo=${encodeURIComponent(myRoute)}`;
                
                try {
                    let data = await fetchWithGoogleProxy(routeInfoUrl);
                    let items = data.response?.body?.items?.item;
                    
                    if (items) {
                        if (Array.isArray(items)) {
                            let matched = items.find(i => (i.routeno || i.routeNo) == myRoute);
                            daeguRouteId = matched ? (matched.routeid || matched.routeId) : (items[0].routeid || items[0].routeId);
                        } else {
                            daeguRouteId = items.routeid || items.routeId;
                        }
                        fetchBusLocations(daeguRouteId); 
                    } else {
                        showError("❌ 정부 서버에 해당 노선 정보가 없습니다.");
                        isFetching = false;
                    }
                } catch (err) {
                    handleApiError(err);
                    isFetching = false;
                }
            } else {
                fetchBusLocations(daeguRouteId);
            }
        }

        async function fetchBusLocations(routeId) {
            const locUrl = `https://apis.data.go.kr/1613000/BusLcInfoInqireService/getRouteAcctoBusLcList?serviceKey=${DAEGU_API_KEY}&pageNo=1&numOfRows=100&_type=json&cityCode=22&routeId=${routeId}`;
            
            try {
                let data = await fetchWithGoogleProxy(locUrl);
                let items = data.response?.body?.items?.item;
                
                if (items) {
                    if (!Array.isArray(items)) items = [items];
                    
                    let buses = [];
                    items.forEach(item => {
                        buses.push({
                            vehicle: (item.vehicleno || item.vehicleNo || "").replace(/[^0-9]/g, ""),
                            nodeOrd: parseInt(item.nodeord || item.nodeOrd),
                            stopName: item.nodenm || item.nodeNm 
                        });
                    });
                    
                    processHeadway(buses); 
                    
                    let now = new Date();
                    let hh = String(now.getHours()).padStart(2, '0');
                    let mm = String(now.getMinutes()).padStart(2, '0');
                    let ss = String(now.getSeconds()).padStart(2, '0');
                    document.getElementById('lastUpdateTime').innerText = `마지막 업데이트: ${hh}:${mm}:${ss}`;
                } else {
                    showError("❌ 현재 노선에 운행 중인 차량이 없습니다.");
                }
            } catch (err) {
                handleApiError(err);
            }
            isFetching = false;
        }

        function handleApiError(err) {
            let msg = "❌ 서버 통신 오류 발생";
            let rawData = err.message;
            
            if (err.message.includes("API_KEY_UNREGISTERED")) {
                msg = "❌ 정부 서버에서 아직 열쇠(API 키)를 승인하지 않았습니다.<br><span style='font-size:14px; color:#ffcc00;'>신청 후 하루 정도 동기화 시간이 필요할 수 있습니다.</span>";
            } else if (err.message.includes("API_KEY_LIMIT")) {
                msg = "❌ 일일 데이터 조회 한도 초과";
            } else if (err.message.includes("NOT_JSON") || err.message.includes("GOOGLE_SERVER_ERROR")) {
                msg = "❌ 구글 서버 또는 정부 서버에서 잘못된 데이터를 반환했습니다.";
            }
            
            let html = `<div class="loading-text" style="color:#ff4d4d;">${msg}</div>`;
            
            // 엑스레이 출력 (진짜 원인 파악용)
            let shortText = rawData.substring(0, 200) + (rawData.length > 200 ? "..." : "");
            shortText = shortText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html += `<div class="debug-box"><strong>[엑스레이 데이터]</strong><br>${shortText}</div>`;
            
            document.getElementById('headwayContainer').innerHTML = html;
        }

        function processHeadway(buses) {
            buses.sort((a, b) => b.nodeOrd - a.nodeOrd);

            let myIndex = buses.findIndex(b => b.vehicle.includes(myVehicle));
            const container = document.getElementById('headwayContainer');
            container.innerHTML = ""; 

            if (myIndex === -1) {
                container.innerHTML = `
                    <div class="loading-text" style="color:#ffcc00;">
                        ⏳ 대장님의 차량(${myVehicle}호)이<br>정부 서버에 아직 잡히지 않았습니다.<br><br>
                        <span style="font-size:15px; color:#aaa;">운행 시작 전이거나 통신 지연일 수 있습니다.<br>우측 하단의 🔄 버튼을 눌러 다시 찾아보세요!</span>
                    </div>`;
                return;
            }

            for (let i = myIndex - 2; i <= myIndex + 2; i++) {
                if (i < 0 || i >= buses.length) continue; 
                
                let b = buses[i];
                let typeClass = ""; let title = ""; let titleColor = ""; let diffText = "";
                let diffNodes = Math.abs(buses[myIndex].nodeOrd - b.nodeOrd);

                if (i === myIndex - 2 || i === myIndex - 1) {
                    typeClass = "ahead"; title = (i === myIndex - 2) ? "앞앞차" : "앞 차";
                    titleColor = "#ff9900"; diffText = `⬆️ ${diffNodes}코스 앞`;
                } else if (i === myIndex) {
                    typeClass = "mine"; title = "내 차";
                    titleColor = "#00cc44"; diffText = `⭐ 내 위치`;
                } else if (i === myIndex + 1 || i === myIndex + 2) {
                    typeClass = "behind"; title = (i === myIndex + 1) ? "뒷 차" : "뒷뒷차";
                    titleColor = "#3b82f6"; diffText = `⬇️ ${diffNodes}코스 뒤`;
                }

                let cardHtml = `
                    <div class="bus-card ${typeClass}">
                        <div class="card-header">
                            <span class="card-role" style="color:${titleColor};">[${title}]</span>
                            <span class="card-diff">${diffText}</span>
                        </div>
                        <div class="card-main">🚌 ${b.vehicle}호</div>
                        <div class="card-sub">📍 ${b.stopName} <span style="color:#666;">(순번:${b.nodeOrd})</span></div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            }
        }
    </script>
</body>
</html>
